<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise - Lesson {{LESSON_NUMBER}}: {{LESSON_TITLE}}</title>
    <link rel="stylesheet" href="../../lib/css/exercise.css">
    <!-- Monaco Editor -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 id="lesson-title">📝 Lesson {{LESSON_NUMBER}}: {{LESSON_TITLE}}</h1>
            <div class="header-right">
                <div class="status">
                    <span id="status">Loading...</span>
                </div>
                <div id="language-switcher">
                    <a href="exercise.ja.html" class="language-link">日本語</a>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Left: Task Panel -->
            <aside class="task-panel">
                <div class="task-header">
                    <h2>Task</h2>
                    <span class="task-toggle">◀</span>
                </div>
                <div class="task-content">
                    <div class="task-description">
                        <h3>📋 Task</h3>
                        {{TASK_DESCRIPTION}}
                    </div>
                    <div class="instructions">
                        <h4>✏️ Instructions</h4>
                        {{INSTRUCTIONS}}
                    </div>
                    <div class="hints">
                        <h4>💡 Hints</h4>
                        {{HINTS}}
                    </div>
                </div>
            </aside>

            <!-- Right: Editor and Console -->
            <div class="code-panel">
                <!-- Code Editor -->
                <div class="editor-container">
                    <div class="editor-header">
                        <span class="editor-label">📝 Code Editor</span>
                        <div class="button-group">
                            <button id="btn-run" class="btn btn-primary" disabled>▶ Run</button>
                            <button id="btn-test" class="btn btn-success" disabled>✓ Test</button>
                            <button id="btn-reset" class="btn btn-secondary">🔄 Reset</button>
                        </div>
                    </div>
                    <div id="editor" class="editor"></div>
                </div>

                <!-- Output Console -->
                <div class="console-container">
                    <div class="console-header">
                        <span class="console-label">💻 Output</span>
                        <button id="btn-clear" class="btn btn-small">Clear</button>
                    </div>
                    <div id="console" class="console"></div>
                </div>
            </div>

            <!-- File Explorer (Right Pane) -->
            <aside id="file-explorer" class="file-explorer">
                <div class="file-explorer-header">
                    <span class="file-explorer-icon">📁</span>
                    <span class="file-explorer-label">Files</span>
                    <span class="file-explorer-toggle">◀</span>
                </div>
                <div class="file-explorer-body">
                    <div id="file-list" class="file-list"></div>
                    <div id="file-content" class="file-content">
                        <div class="file-empty-state">Select a file to view</div>
                    </div>
                </div>
            </aside>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-nav">
                <a href="../../index.html" class="btn btn-secondary">← Back to Menu</a>
                <a href="theory.en.html" class="btn btn-link">📚 Back to Theory</a>
            </div>
            <div class="footer-next">
                <!-- Add next lesson link here if available -->
            </div>
        </footer>
    </div>

    <!-- Test Results Modal (Display at bottom) -->
    <div id="test-results-overlay" style="display: none; position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.5); padding: 16px; z-index: 1000;">
        <div class="test-results-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h3 style="margin: 0;">Test Results</h3>
                <button id="btn-close-results" class="btn btn-small">Close</button>
            </div>
            <div id="test-results"></div>
            <div style="margin-top: 16px; text-align: right;">
                <a href="../../index.html" class="btn btn-link">Back to Menu</a>
            </div>
        </div>
    </div>

    <!-- Pyodide -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <!-- Monaco Editor -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <!-- Common Libraries -->
    <script src="../../lib/js/i18n.js"></script>
    <script src="../../lib/js/runner.js"></script>
    <script src="../../lib/js/editor.js"></script>
    <script src="../../lib/js/tester.js"></script>
    <script src="../../lib/js/fileviewer.js"></script>
    <script src="../../lib/js/exercise-common.js"></script>
    
    <!-- Application Script -->
    <script>
        const INITIAL_CODE = `{{INITIAL_CODE}}`;

        const TESTS = {{TESTS}};
        
        // Initial files to load (for data analysis lessons)
        const INITIAL_FILES = {{INITIAL_FILES}};
        
        // Execute on page load
        window.addEventListener('DOMContentLoaded', async () => {
            // Initialize language (auto-detect from filename)
            if (window.i18n) {
                window.i18n.init();
            }
            
            setupButtons();
            await initializeExercise({
                initialCode: INITIAL_CODE,
                tests: TESTS,
                initialFiles: INITIAL_FILES
            });
        });
    </script>
</body>
</html>
