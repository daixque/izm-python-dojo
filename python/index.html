<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python学習環境 - プログラミング入門</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Monaco Editor -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.css">
</head>
<body>
    <div class="container">
        <!-- ヘッダー -->
        <header class="header">
            <h1>🐍 Python学習環境</h1>
            <div class="status">
                <span id="status">準備中...</span>
            </div>
        </header>

        <!-- メインコンテンツ -->
        <div class="main-content">
            <!-- 左側：説明エリア -->
            <aside class="lesson-panel">
                <div class="lesson-header">
                    <h2 id="lesson-title">レッスンをロード中...</h2>
                </div>
                <div class="lesson-content">
                    <div id="lesson-description" class="description">
                        レッスンを読み込んでいます...
                    </div>
                    <div id="lesson-task" class="task">
                    </div>
                </div>
            </aside>

            <!-- 右側：エディタとコンソール -->
            <div class="code-panel">
                <!-- コードエディタ -->
                <div class="editor-container">
                    <div class="editor-header">
                        <span class="editor-label">📝 コードエディタ</span>
                        <div class="button-group">
                            <button id="btn-run" class="btn btn-primary" disabled>▶ 実行</button>
                            <button id="btn-reset" class="btn btn-secondary">🔄 リセット</button>
                        </div>
                    </div>
                    <div id="editor" class="editor"></div>
                </div>

                <!-- 出力コンソール -->
                <div class="console-container">
                    <div class="console-header">
                        <span class="console-label">💻 実行結果</span>
                        <button id="btn-clear" class="btn btn-small">クリア</button>
                    </div>
                    <div id="console" class="console"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Pyodide -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <!-- Monaco Editor -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <!-- アプリケーションスクリプト -->
    <script src="js/runner.js"></script>
    <script src="js/editor.js"></script>
</body>
</html>
