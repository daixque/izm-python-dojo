<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python学習環境 - プログラミング入門</title>
    <script src="lib/js/i18n.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 48px;
            position: relative;
        }
        
        .language-switcher {
            position: absolute;
            top: 0;
            right: 0;
        }
        
        .language-select {
            padding: 8px 16px;
            border-radius: 8px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .language-select:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        .language-select option {
            background: #764ba2;
            color: white;
        }
        
        .header h1 {
            font-size: 48px;
            margin-bottom: 12px;
        }
        
        .header p {
            font-size: 18px;
            opacity: 0.9;
        }
        
        .lessons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        
        .lesson-card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }
        
        .lesson-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
        }
        
        .lesson-number {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 40px;
            height: 40px;
            line-height: 40px;
            text-align: center;
            border-radius: 50%;
            font-weight: bold;
            margin-bottom: 16px;
        }
        
        .lesson-card h2 {
            font-size: 24px;
            color: #333;
            margin-bottom: 12px;
        }
        
        .lesson-card p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .lesson-links {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s;
            text-align: center;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
            flex: 1;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
            flex: 1;
        }
        
        .btn-secondary:hover {
            background: #d0d0d0;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 36px;
            }
            
            .lessons-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ヘッダー -->
        <header class="header">
            <div class="language-switcher" id="language-switcher"></div>
            <h1 id="page-title">🐍 Python学習環境</h1>
            <p id="page-subtitle">中学生向けプログラミング入門教材</p>
        </header>

        <!-- レッスン一覧 -->
        <div class="lessons-grid">
            <!-- レッスン1 -->
            <div class="lesson-card">
                <div class="lesson-number">1</div>
                <h2 id="lesson1-title">はじめてのPython</h2>
                <p id="lesson1-desc">print関数を使って「Hello, World!」を表示してみよう。プログラミングの第一歩を体験します。</p>
                <div class="lesson-links">
                    <a href="lessons/01_hello/theory.html" class="btn btn-secondary" id="lesson1-theory-btn">📚 理論</a>
                    <a href="lessons/01_hello/exercise.html" class="btn btn-primary" id="lesson1-exercise-btn">✏️ 演習</a>
                </div>
            </div>

            <!-- 今後のレッスン用プレースホルダー -->
            <div class="lesson-card" style="opacity: 0.5;">
                <div class="lesson-number">2</div>
                <h2 id="lesson2-title">変数と計算</h2>
                <p id="lesson2-desc">変数を使ってデータを保存し、計算をしてみよう。</p>
                <div class="lesson-links">
                    <button class="btn btn-secondary" disabled id="lesson2-theory-btn">📚 理論</button>
                    <button class="btn btn-primary" disabled id="lesson2-exercise-btn">✏️ 演習</button>
                </div>
            </div>

            <div class="lesson-card" style="opacity: 0.5;">
                <div class="lesson-number">3</div>
                <h2 id="lesson3-title">条件分岐（if文）</h2>
                <p id="lesson3-desc">条件によって処理を変える方法を学ぼう。</p>
                <div class="lesson-links">
                    <button class="btn btn-secondary" disabled id="lesson3-theory-btn">📚 理論</button>
                    <button class="btn btn-primary" disabled id="lesson3-exercise-btn">✏️ 演習</button>
                </div>
            </div>

            <div class="lesson-card" style="opacity: 0.5;">
                <div class="lesson-number">4</div>
                <h2 id="lesson4-title">繰り返し（for文）</h2>
                <p id="lesson4-desc">同じ処理を繰り返し実行する方法を学ぼう。</p>
                <div class="lesson-links">
                    <button class="btn btn-secondary" disabled id="lesson4-theory-btn">📚 理論</button>
                    <button class="btn btn-primary" disabled id="lesson4-exercise-btn">✏️ 演習</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 多言語UIの更新
        function updateUITexts() {
            document.getElementById('page-title').textContent = `🐍 ${window.i18n.t('appTitle')}`;
            document.getElementById('page-subtitle').textContent = window.i18n.t('subtitle');
            
            // Lesson 1
            document.getElementById('lesson1-title').textContent = window.i18n.t('lesson1_title');
            document.getElementById('lesson1-desc').textContent = window.i18n.t('lesson1_desc');
            document.getElementById('lesson1-theory-btn').innerHTML = `📚 ${window.i18n.t('label_theory')}`;
            document.getElementById('lesson1-exercise-btn').innerHTML = `✏️ ${window.i18n.t('label_exercise')}`;
            
            // Lesson 2
            document.getElementById('lesson2-title').textContent = window.i18n.t('lesson2_title');
            document.getElementById('lesson2-desc').textContent = window.i18n.t('lesson2_desc');
            document.getElementById('lesson2-theory-btn').innerHTML = `📚 ${window.i18n.t('label_theory')}`;
            document.getElementById('lesson2-exercise-btn').innerHTML = `✏️ ${window.i18n.t('label_exercise')}`;
            
            // Lesson 3
            document.getElementById('lesson3-title').textContent = window.i18n.t('lesson3_title');
            document.getElementById('lesson3-desc').textContent = window.i18n.t('lesson3_desc');
            document.getElementById('lesson3-theory-btn').innerHTML = `📚 ${window.i18n.t('label_theory')}`;
            document.getElementById('lesson3-exercise-btn').innerHTML = `✏️ ${window.i18n.t('label_exercise')}`;
            
            // Lesson 4
            document.getElementById('lesson4-title').textContent = window.i18n.t('lesson4_title');
            document.getElementById('lesson4-desc').textContent = window.i18n.t('lesson4_desc');
            document.getElementById('lesson4-theory-btn').innerHTML = `📚 ${window.i18n.t('label_theory')}`;
            document.getElementById('lesson4-exercise-btn').innerHTML = `✏️ ${window.i18n.t('label_exercise')}`;
        }
        
        // 初期化
        window.addEventListener('DOMContentLoaded', () => {
            window.i18n.init();
            window.i18n.createLanguageSwitcher('language-switcher', updateUITexts);
            updateUITexts();
        });
    </script>
</body>
</html>
