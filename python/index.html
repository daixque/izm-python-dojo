<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python学習環境 - プログラミング入門</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 48px;
        }
        
        .header h1 {
            font-size: 48px;
            margin-bottom: 12px;
        }
        
        .header p {
            font-size: 18px;
            opacity: 0.9;
        }
        
        .lessons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        
        .lesson-card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }
        
        .lesson-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
        }
        
        .lesson-number {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 40px;
            height: 40px;
            line-height: 40px;
            text-align: center;
            border-radius: 50%;
            font-weight: bold;
            margin-bottom: 16px;
        }
        
        .lesson-card h2 {
            font-size: 24px;
            color: #333;
            margin-bottom: 12px;
        }
        
        .lesson-card p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .lesson-links {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s;
            text-align: center;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
            flex: 1;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
            flex: 1;
        }
        
        .btn-secondary:hover {
            background: #d0d0d0;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 36px;
            }
            
            .lessons-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ヘッダー -->
        <header class="header">
            <h1>🐍 Python学習環境</h1>
            <p>中学生向けプログラミング入門教材</p>
        </header>

        <!-- レッスン一覧 -->
        <div class="lessons-grid">
            <!-- レッスン1 -->
            <div class="lesson-card">
                <div class="lesson-number">1</div>
                <h2>はじめてのPython</h2>
                <p>print関数を使って「Hello, World!」を表示してみよう。プログラミングの第一歩を体験します。</p>
                <div class="lesson-links">
                    <a href="lessons/01_hello/theory.html" class="btn btn-secondary">📚 理論</a>
                    <a href="lessons/01_hello/exercise.html" class="btn btn-primary">✏️ 演習</a>
                </div>
            </div>

            <!-- 今後のレッスン用プレースホルダー -->
            <div class="lesson-card" style="opacity: 0.5;">
                <div class="lesson-number">2</div>
                <h2>変数と計算</h2>
                <p>変数を使ってデータを保存し、計算をしてみよう。</p>
                <div class="lesson-links">
                    <button class="btn btn-secondary" disabled>📚 理論</button>
                    <button class="btn btn-primary" disabled>✏️ 演習</button>
                </div>
            </div>

            <div class="lesson-card" style="opacity: 0.5;">
                <div class="lesson-number">3</div>
                <h2>条件分岐（if文）</h2>
                <p>条件によって処理を変える方法を学ぼう。</p>
                <div class="lesson-links">
                    <button class="btn btn-secondary" disabled>📚 理論</button>
                    <button class="btn btn-primary" disabled>✏️ 演習</button>
                </div>
            </div>

            <div class="lesson-card" style="opacity: 0.5;">
                <div class="lesson-number">4</div>
                <h2>繰り返し（for文）</h2>
                <p>同じ処理を繰り返し実行する方法を学ぼう。</p>
                <div class="lesson-links">
                    <button class="btn btn-secondary" disabled>📚 理論</button>
                    <button class="btn btn-primary" disabled>✏️ 演習</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
