lesson:
  number: "01_01"  # チャプター_レッスン形式
  id: "hello"
  title: "はじめてのPython"

content: |
  <section class="section">
    <h2>プログラミングの第一歩</h2>
    <p>プログラミングの世界では、新しい言語を学ぶときの最初のプログラムとして「Hello, World!」を表示するのが伝統です。</p>
    <p>この単純なプログラムを通じて、コードを書いて実行する基本的な流れを体験できます。</p>
  </section>

  <section class="section">
    <h2>print関数とは</h2>
    <p>Pythonでは、<code>print()</code>という関数を使って、文字や数字を画面に表示することができます。</p>
    <p>カッコの中に表示したい内容を書くと、その内容が実行結果に表示されます。</p>
  </section>

  <section class="section">
    <h2>文字列の書き方</h2>
    <p>文字列（テキスト）を表示するときは、ダブルクォーテーション（<code>"</code>）またはシングルクォーテーション（<code>'</code>）で囲みます。</p>
    <p>どちらを使っても同じ結果になりますが、統一して使うことが推奨されます。</p>
  </section>

  <section class="examples">
    <h2>コード例</h2>
    
    <div class="example-item">
      <div class="example-title">基本的な使い方</div>
      <div class="example-code">print("Hello, World!")</div>
      <div class="example-explanation">文字列をダブルクォーテーションで囲んで表示します。</div>
    </div>

    <div class="example-item">
      <div class="example-title">シングルクォーテーションも使える</div>
      <div class="example-code">print('こんにちは、Python!')</div>
      <div class="example-explanation">シングルクォーテーションでも同じように表示できます。</div>
    </div>

    <div class="example-item">
      <div class="example-title">複数行を表示</div>
      <div class="example-code">print("こんにちは")<br>print("Python!")</div>
      <div class="example-explanation">複数のprint文を書くと、それぞれが改行されて表示されます。</div>
    </div>

    <div class="example-item">
      <div class="example-title">数字を表示</div>
      <div class="example-code">print(123)<br>print(3 + 5)</div>
      <div class="example-explanation">数字はクォーテーションなしで表示できます。計算結果も表示できます。</div>
    </div>
  </section>
