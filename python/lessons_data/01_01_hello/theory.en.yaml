lesson:
  number: "01_01"  # Chapter_Lesson format
  id: "hello"
  title: "First Steps with Python"

content: |
  <section class="section">
    <h2>Your First Program</h2>
    <p>In the programming world, it's a tradition to display 'Hello, World!' as your first program when learning a new language.</p>
    <p>Through this simple program, you can experience the basic flow of writing and running code.</p>
  </section>

  <section class="section">
    <h2>What is the print Function?</h2>
    <p>In Python, you can use the <code>print()</code> function to display text and numbers on the screen.</p>
    <p>When you write what you want to display inside the parentheses, that content will appear in the output.</p>
  </section>

  <section class="section">
    <h2>How to Write Strings</h2>
    <p>When displaying strings (text), you need to enclose them in double quotes (<code>"</code>) or single quotes (<code>'</code>).</p>
    <p>Either works the same way, but it's recommended to use them consistently.</p>
  </section>

  <section class="examples">
    <h2>Examples</h2>
    
    <div class="example-item">
      <div class="example-title">Basic Usage</div>
      <div class="example-code">print("Hello, World!")</div>
      <div class="example-explanation">Display a string enclosed in double quotes.</div>
    </div>

    <div class="example-item">
      <div class="example-title">Single Quotes Work Too</div>
      <div class="example-code">print('Hello, Python!')</div>
      <div class="example-explanation">Single quotes work the same way.</div>
    </div>

    <div class="example-item">
      <div class="example-title">Display Multiple Lines</div>
      <div class="example-code">print("Hello")<br>print("Python!")</div>
      <div class="example-explanation">Multiple print statements will each display on a new line.</div>
    </div>

    <div class="example-item">
      <div class="example-title">Display Numbers</div>
      <div class="example-code">print(123)<br>print(3 + 5)</div>
      <div class="example-explanation">Numbers can be displayed without quotes. You can also display calculation results.</div>
    </div>
  </section>
