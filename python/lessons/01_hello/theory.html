<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>理論説明 - レッスン1</title>
    <link rel="stylesheet" href="../../lib/css/theory.css">
    <script src="../../lib/js/i18n.js"></script>
</head>
<body>
    <div class="container">
        <!-- ヘッダー -->
        <header class="header">
            <h1 id="lesson-title">レッスンを読み込み中...</h1>
            <div class="lesson-meta">
                <span id="lesson-type">📚 理論説明</span>
                <div id="language-switcher-container"></div>
            </div>
        </header>

        <!-- コンテンツ -->
        <main class="content" id="content">
            <p>レッスンデータを読み込んでいます...</p>
        </main>

        <!-- フッター -->
        <footer class="footer">
            <a href="../../index.html" class="btn btn-secondary" id="btn-back-menu">← 目次に戻る</a>
            <div style="display: flex; gap: 12px;">
                <a href="exercise.html" class="btn btn-primary" id="btn-start-exercise">演習を始める →</a>
                <!-- 次のレッスンがある場合はここに追加 -->
                <!-- <a href="../02_variables/theory.html" class="btn btn-primary">次のレッスン →</a> -->
            </div>
        </footer>
    </div>

    <script>
        // UI要素を翻訳
        function updateUITexts() {
            document.getElementById('lesson-type').textContent = window.i18n.t('label_theory');
            document.getElementById('btn-back-menu').textContent = window.i18n.t('btn_backToMenu');
            document.getElementById('btn-start-exercise').textContent = window.i18n.t('btn_startExercise');
        }
        
        // レッスンデータを読み込んで表示
        async function loadLesson() {
            try {
                const lessonFile = window.i18n.getLessonFilePath();
                const response = await fetch(lessonFile);
                const lesson = await response.json();
                
                // タイトル
                document.getElementById('lesson-title').textContent = lesson.theory.title;
                document.title = `${window.i18n.t('label_theory')} - ${lesson.title}`;
                
                // コンテンツ
                const contentHTML = [];
                
                // セクション
                lesson.theory.sections.forEach(section => {
                    contentHTML.push(`
                        <section class="section">
                            <h2>${section.heading}</h2>
                            ${section.content.map(p => `<p>${p}</p>`).join('')}
                        </section>
                    `);
                });
                
                // コード例
                if (lesson.theory.examples && lesson.theory.examples.length > 0) {
                    const examplesHTML = lesson.theory.examples.map(example => `
                        <div class="example-item">
                            <div class="example-title">${example.title}</div>
                            <div class="example-code">${escapeHtml(example.code)}</div>
                            <div class="example-explanation">${example.explanation}</div>
                        </div>
                    `).join('');
                    
                    contentHTML.push(`
                        <section class="examples">
                            <h2>${window.i18n.t('section_examples')}</h2>
                            ${examplesHTML}
                        </section>
                    `);
                }
                
                document.getElementById('content').innerHTML = contentHTML.join('');
                
            } catch (error) {
                console.error('Failed to load lesson:', error);
                document.getElementById('content').innerHTML = `
                    <div class="section">
                        <p style="color: red;">エラー: レッスンデータの読み込みに失敗しました。</p>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
        
        // HTMLエスケープ
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ページ読み込み時に実行
        window.addEventListener('DOMContentLoaded', () => {
            window.i18n.init();
            window.i18n.createLanguageSwitcher('language-switcher-container', () => {
                updateUITexts();
                loadLesson();
            });
            updateUITexts();
            loadLesson();
        });
    </script>
</body>
</html>
