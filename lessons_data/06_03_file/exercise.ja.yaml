lesson:
  number: "06_03"
  id: "06_03_file"
  title: "ファイル操作の基礎"
description: "open()とwith文を使ってテキストファイルの読み書きを行う方法を学びます。"

task_description: |
  <p>メモ帳アプリの基本機能として、テキストファイルを保存・読み込みする2つの関数を実装しましょう。</p>
  <ol>
    <li><strong>save_memo(filename, content)</strong>：テキストをファイルに保存する関数</li>
    <li><strong>load_memo(filename)</strong>：ファイルからテキストを読み込む関数</li>
  </ol>

instructions:
  - "<code>save_memo</code> 関数では <code>with open(filename, 'w', encoding='utf-8') as f:</code> を使ってファイルを開き、<code>f.write(content)</code> で内容を書き込みます"
  - "<code>load_memo</code> 関数では <code>try:</code> ブロック内で <code>with open(filename, 'r', encoding='utf-8') as f:</code> を使ってファイルを開き、<code>f.read()</code> で内容を返します"
  - "ファイルが存在しない場合（<code>FileNotFoundError</code>）は <code>None</code> を返してください"
  - "関数の外のテストコードは変更しないでください"

hints:
  - hint: |
      <code>save_memo</code> 関数の基本構造：<br>
      <code>with open(filename, 'w', encoding='utf-8') as f:</code><br>
      &nbsp;&nbsp;&nbsp;&nbsp;<code>f.write(content)</code>
  - hint: |
      <code>load_memo</code> 関数の基本構造：<br>
      <code>try:</code><br>
      &nbsp;&nbsp;&nbsp;&nbsp;<code>with open(filename, 'r', encoding='utf-8') as f:</code><br>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<code>return f.read()</code><br>
      <code>except FileNotFoundError:</code><br>
      &nbsp;&nbsp;&nbsp;&nbsp;<code>return None</code>
  - hint: |
      <code>pass</code> は「何もしない」という意味です。実装を書いたら <code>pass</code> は削除してください。
  - hint: |
      ファイルが存在しない場合の確認：<code>load_memo("notfound.txt")</code> を呼ぶと <code>FileNotFoundError</code> が発生します。<code>except FileNotFoundError:</code> でキャッチして <code>return None</code> を返しましょう。
