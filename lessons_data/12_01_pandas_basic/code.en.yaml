solution_code: |
  import pandas as pd

  def column_mean(df, column):
      return df[column].mean()

  test_df = pd.DataFrame({
      "name": ["Alice", "Bob", "Charlie"],
      "score": [80, 90, 70]
  })
  print(column_mean(test_df, "score"))

