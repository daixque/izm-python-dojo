initial_code: |
  def validate_age(age):
      # ここにコードを書いてください
      # age が 0 以上 150 以下なら age を返す
      # それ以外は ValueError を raise する
      pass

  print(validate_age(25))   # 25
  print(validate_age(0))    # 0
  print(validate_age(150))  # 150
  # validate_age(-1)        # ValueError
  # validate_age(200)       # ValueError

solution_code: |
  def validate_age(age):
      if age < 0 or age > 150:
          raise ValueError(f"無効な年齢です: {age}")
      return age

  print(validate_age(25))
  print(validate_age(0))
  print(validate_age(150))

