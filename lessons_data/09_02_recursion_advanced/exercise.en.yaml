      <code>def fibonacci(n):</code><br>
      &nbsp;&nbsp;&nbsp;&nbsp;<code>if n == 0:</code><br>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<code>return ???</code><br>
      &nbsp;&nbsp;&nbsp;&nbsp;<code>if n == 1:</code><br>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<code>return ???</code>
  - hint: |
      In the recursive case, add two recursive calls together:<br>
      <code>return fibonacci(n - 1) + fibonacci(???)</code>
  - hint: |
      The completed function looks like this:<br>
      <code>def fibonacci(n):</code><br>
      &nbsp;&nbsp;&nbsp;&nbsp;<code>if n == 0:</code><br>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<code>return 0</code><br>
      &nbsp;&nbsp;&nbsp;&nbsp;<code>if n == 1:</code><br>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<code>return 1</code><br>
      &nbsp;&nbsp;&nbsp;&nbsp;<code>return fibonacci(n - 1) + fibonacci(n - 2)</code>
