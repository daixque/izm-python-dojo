lesson:
  number: "07_01"
  id: "07_01_try_except"
  title: "try/except の基礎"
description: "try/except を使って、エラーが起きても安全に動作する関数を実装します。"

task_description: |
  <p>関数 <code>safe_int(value)</code> を実装しましょう。</p>
  <p>文字列 <code>value</code> を整数に変換して返します。変換できない場合（<code>ValueError</code> が発生した場合）は <code>None</code> を返します。</p>
  <h3>実行例</h3>
  <pre>print(safe_int("42"))    # 42
  print(safe_int("abc"))   # None
  print(safe_int("3.14"))  # None</pre>

instructions:
  - "関数シグネチャ <code>def safe_int(value):</code> は用意済みです"
  - "<code>try:</code> ブロックの中で <code>int(value)</code> を使って変換します"
  - "<code>except ValueError:</code> でエラーをキャッチします"
  - "変換に成功したら変換後の整数を <code>return</code> で返します"
  - "変換に失敗したら <code>None</code> を <code>return</code> で返します"

hints:
  - hint: |
      try/except の基本的な形：<br>
      <code>def safe_int(value):</code><br>
      &nbsp;&nbsp;&nbsp;&nbsp;<code>try:</code><br>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<code>return int(value)</code><br>
      &nbsp;&nbsp;&nbsp;&nbsp;<code>except ValueError:</code><br>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<code>return ???</code>
  - hint: |
      エラーが発生したときは <code>None</code> を返します：<br>
      <code>except ValueError:</code><br>
      &nbsp;&nbsp;&nbsp;&nbsp;<code>return None</code>
  - hint: |
      <code>"3.14"</code> のような小数点を含む文字列は <code>int()</code> で変換できないため、<code>ValueError</code> になります。<br>
      <code>float("3.14")</code> は成功しますが、<code>int("3.14")</code> はエラーになります。
