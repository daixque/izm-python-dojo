lesson:
  number: "07_01"
  id: "07_01_try_except"
  title: "try/except の基礎"

content: |
  <section class="section">
    <h2>💥 エラー（例外）とは何か</h2>
    <p>プログラムを実行していると、予期しない問題が起きることがあります。</p>
    <p>例えば、文字列を数値に変換しようとしたとき、数値じゃない文字列が来たり、存在しないファイルを開こうとしたりすると<strong>エラー（例外）</strong>が発生します。</p>
    <p>エラーが発生すると、通常はプログラムがそこで止まってしまいます。</p>
    <p>Pythonでは、このようなエラーを<strong>例外（exception）</strong>と呼びます。</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">エラーが発生する例</div>
      <div class="example-code">int("abc")&nbsp;&nbsp;# エラー！<br># ValueError: invalid literal for int() with base 10: 'abc'</div>
      <div class="example-explanation">
        <code>"abc"</code> は数値に変換できないため、<code>ValueError</code> というエラーが発生します。<br>
        このままでは、プログラムがここで止まってしまいます。
      </div>
    </div>
  </section>

  <section class="section">
    <h2>🛡️ try/except ブロックの書き方</h2>
    <p><code>try</code> と <code>except</code> を使うと、エラーが発生しても<strong>プログラムを止めずに</strong>対処できます。</p>
    <p><code>try</code> ブロックの中にエラーが起きそうな処理を書き、<code>except</code> ブロックの中にエラーが起きたときの処理を書きます。</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">try/except の基本構文</div>
      <div class="example-code">try:<br>&nbsp;&nbsp;&nbsp;&nbsp;# エラーが起きそうな処理<br>&nbsp;&nbsp;&nbsp;&nbsp;処理<br>except エラーの種類:<br>&nbsp;&nbsp;&nbsp;&nbsp;# エラーが起きたときの処理<br>&nbsp;&nbsp;&nbsp;&nbsp;処理</div>
      <div class="example-explanation">
        <strong>ポイント：</strong><br>
        - <code>try:</code> の中に「試したい処理」を書く<br>
        - <code>except:</code> の中に「エラーが起きたときの対処」を書く<br>
        - エラーが起きなければ <code>except</code> は実行されない
      </div>
    </div>

    <div class="example-item">
      <div class="example-title">try/except を使った例</div>
      <div class="example-code">try:<br>&nbsp;&nbsp;&nbsp;&nbsp;number = int("abc")<br>&nbsp;&nbsp;&nbsp;&nbsp;print(number)<br>except ValueError:<br>&nbsp;&nbsp;&nbsp;&nbsp;print("数値に変換できませんでした")<br><br># 出力: 数値に変換できませんでした</div>
      <div class="example-explanation">
        <code>int("abc")</code> でエラーが発生すると、<code>except ValueError:</code> の中の処理が実行されます。<br>
        プログラムは止まらずに続きます。
      </div>
    </div>
  </section>

  <section class="section">
    <h2>🔄 例外が起きたときの流れ</h2>
    <p>try/except ブロックでの処理の流れを確認しましょう。</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">エラーが起きた場合の流れ</div>
      <div class="example-code">try:<br>&nbsp;&nbsp;&nbsp;&nbsp;print("処理1")&nbsp;&nbsp;# 実行される<br>&nbsp;&nbsp;&nbsp;&nbsp;x = int("abc")&nbsp;&nbsp;# ここでエラー<br>&nbsp;&nbsp;&nbsp;&nbsp;print("処理2")&nbsp;&nbsp;# 実行されない<br>except ValueError:<br>&nbsp;&nbsp;&nbsp;&nbsp;print("エラーをキャッチ")&nbsp;&nbsp;# 実行される<br><br>print("プログラム続行")&nbsp;&nbsp;# 実行される</div>
      <div class="example-explanation">
        エラーが起きた行より後の <code>try</code> ブロック内の処理はスキップされます。<br>
        <code>except</code> の処理が終わった後、プログラムは続きから実行されます。
      </div>
    </div>

    <div class="example-item">
      <div class="example-title">エラーが起きない場合の流れ</div>
      <div class="example-code">try:<br>&nbsp;&nbsp;&nbsp;&nbsp;print("処理1")&nbsp;&nbsp;# 実行される<br>&nbsp;&nbsp;&nbsp;&nbsp;x = int("42")&nbsp;&nbsp;&nbsp;# 成功<br>&nbsp;&nbsp;&nbsp;&nbsp;print("処理2")&nbsp;&nbsp;# 実行される<br>except ValueError:<br>&nbsp;&nbsp;&nbsp;&nbsp;print("エラーをキャッチ")&nbsp;&nbsp;# 実行されない<br><br>print("プログラム続行")&nbsp;&nbsp;# 実行される</div>
      <div class="example-explanation">
        エラーが起きなければ、<code>except</code> の中は実行されません。<br>
        <code>try</code> ブロックがすべて正常に実行された後、続きに進みます。
      </div>
    </div>
  </section>

  <section class="section">
    <h2>📋 エラーメッセージを使う</h2>
    <p><code>except エラーの種類 as e:</code> と書くと、エラーの詳しい情報を変数 <code>e</code> で受け取れます。</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">エラーメッセージを表示する</div>
      <div class="example-code">try:<br>&nbsp;&nbsp;&nbsp;&nbsp;number = int("hello")<br>except ValueError as e:<br>&nbsp;&nbsp;&nbsp;&nbsp;print(f"エラーが発生しました: {e}")<br><br># 出力: エラーが発生しました: invalid literal for int() with base 10: 'hello'</div>
      <div class="example-explanation">
        <code>as e</code> で例外オブジェクトを受け取り、<code>str(e)</code> や f文字列でエラーメッセージを表示できます。<br>
        デバッグ（バグ探し）に役立ちます。
      </div>
    </div>

    <div class="example-item">
      <div class="example-title">安全な変換関数を作る</div>
      <div class="example-code">def safe_int(value):<br>&nbsp;&nbsp;&nbsp;&nbsp;try:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return int(value)<br>&nbsp;&nbsp;&nbsp;&nbsp;except ValueError:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return None<br><br>print(safe_int("42"))&nbsp;&nbsp;&nbsp;&nbsp;# 42<br>print(safe_int("abc"))&nbsp;&nbsp;&nbsp;# None<br>print(safe_int("3.14"))&nbsp;&nbsp;# None</div>
      <div class="example-explanation">
        エラーが起きたら <code>None</code> を返すことで、呼び出し元が安全に使える関数にできます。<br>
        このようなパターンはよく使われます。
      </div>
    </div>
  </section>

  <section class="section">
    <h2>💡 まとめ</h2>
    <ul>
      <li>エラー（例外）はプログラム実行中に起きる問題のこと</li>
      <li><code>try:</code> ブロックにエラーが起きそうな処理を書く</li>
      <li><code>except エラーの種類:</code> にエラーが起きたときの処理を書く</li>
      <li>エラーが起きた行より後の <code>try</code> ブロック内の処理はスキップされる</li>
      <li><code>except エラー as e:</code> でエラーの詳細情報を受け取れる</li>
    </ul>
  </section>
