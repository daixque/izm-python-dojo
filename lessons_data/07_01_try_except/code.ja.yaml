initial_code: |
  def safe_int(value):
      # ここにコードを書いてください
      # value を整数に変換して返す
      # 変換できない場合は None を返す
      pass

  print(safe_int("42"))    # 42
  print(safe_int("abc"))   # None
  print(safe_int("3.14"))  # None

solution_code: |
  def safe_int(value):
      try:
          return int(value)
      except ValueError:
          return None

  print(safe_int("42"))
  print(safe_int("abc"))
  print(safe_int("3.14"))

