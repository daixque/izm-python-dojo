lesson:
  number: "04_04"
  id: "04_04_dict"
  title: "辞書の基礎"

task_description: |
  <p>関数 <code>get_score(students, name)</code> を実装しましょう。</p>
  <p><code>students</code> は生徒名をキー、点数を値とする辞書です。<code>name</code> で指定された生徒の点数を返します。</p>
  <p>生徒が辞書に存在しない場合は <strong>-1</strong> を返してください。</p>
  <h3>実行例</h3>
  <pre>  students = {"Alice": 85, "Bob": 92, "Charlie": 78}
  get_score(students, "Alice")    # 85
  get_score(students, "Bob")      # 92
  get_score(students, "Dave")     # -1（存在しない）</pre>

instructions:
  - "<code>in</code> 演算子を使って <code>name</code> が <code>students</code> に存在するか確認します"
  - "存在する場合は <code>students[name]</code> を返します"
  - "存在しない場合は <code>-1</code> を返します"

hints:
  - hint: |
      in 演算子でキーの存在を確認します：<br>
      <code>if name in students:</code><br>
      &nbsp;&nbsp;&nbsp;&nbsp;<code># name が辞書に存在する</code>
  - hint: |
      存在する場合は辞書からその値を返します：<br>
      <code>return students[name]</code>
  - hint: |
      存在しない場合は -1 を返します：<br>
      <code>else:</code><br>
      &nbsp;&nbsp;&nbsp;&nbsp;<code>return -1</code>
  - hint: |
      <code>.get()</code> を使って1行で書くこともできます：<br>
      <code>return students.get(name, -1)</code>
