solution_code: |
  def get_score(students, name):
      if name in students:
          return students[name]
      else:
          return -1

  # テスト実行
  students = {"Alice": 85, "Bob": 92, "Charlie": 78}
  print(get_score(students, "Alice"))
  print(get_score(students, "Bob"))
  print(get_score(students, "Dave"))

