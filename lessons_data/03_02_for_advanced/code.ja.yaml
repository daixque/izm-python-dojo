initial_code: |
  def sum_numbers(n):
      total = 0
      # ここにコードを書いてください
      # for ループで 1 から n まで繰り返し、total に加算する
      return total

  print(sum_numbers(5))   # 15 になるはず
  print(sum_numbers(10))  # 55 になるはず

solution_code: |
  def sum_numbers(n):
      total = 0
      for i in range(1, n + 1):
          total += i
      return total

  print(sum_numbers(5))
  print(sum_numbers(10))

