solution_code: |
  def check_guess(secret, guess):
      if guess < secret:
          return "Too low"
      elif guess > secret:
          return "Too high"
      else:
          return "Correct"

  def play_round(secret, guesses):
      for i, guess in enumerate(guesses, 1):
          result = check_guess(secret, guess)
          if result == "Correct":
              return (i, "Correct")
      return (len(guesses), check_guess(secret, guesses[-1]))

  # テスト実行
  print(check_guess(50, 30))
  print(check_guess(50, 70))
  print(check_guess(50, 50))
  print(play_round(50, [30, 70, 50]))

