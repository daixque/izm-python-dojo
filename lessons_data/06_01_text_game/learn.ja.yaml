lesson:
  number: "06_01"
  id: "06_01_text_game"
  title: "テキストベースゲーム"

content: |
  <section class="section">
    <h2>🎮 実践プロジェクト：テキストベースゲーム</h2>
    <p>これまでに学んだ「関数」「ループ」「条件分岐」「リスト」などの知識を組み合わせて、実際のゲームプログラムを作ってみましょう！</p>
    <p>このレッスンでは、<strong>数当てゲーム</strong>を題材に、プログラムの設計と実装を学びます。</p>
  </section>

  <section class="section">
    <h2>🎲 乱数を使う - random モジュール</h2>
    <p>ゲームでは「ランダムな数」が必要になることがよくあります。Pythonでは <code>random</code> モジュールの <code>randint()</code> 関数を使って乱数を生成できます。</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">random.randint() の使い方</div>
      <div class="example-code">import random<br><br># 1から100までのランダムな整数を生成<br>number = random.randint(1, 100)<br>print(number)  # 例: 42<br><br># 1から10までのランダムな整数<br>dice = random.randint(1, 6)<br>print(f"サイコロ: {dice}")</div>
      <div class="example-explanation"><code>random.randint(a, b)</code> は、<strong>a 以上 b 以下</strong>のランダムな整数を返します。引数の両端を含みます。</div>
    </div>
  </section>

  <section class="section">
    <h2>🔁 ゲームループの構造</h2>
    <p>ゲームは「プレイヤーが正解するまで繰り返す」という処理が基本です。<code>while True</code> と <code>break</code> を組み合わせてゲームループを作ります。</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">ゲームループの基本構造</div>
      <div class="example-code">while True:<br>&nbsp;&nbsp;&nbsp;&nbsp;guess = int(input("数を入力してください: "))<br>&nbsp;&nbsp;&nbsp;&nbsp;if guess == secret:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;print("正解！")<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;break  # ループを終了<br>&nbsp;&nbsp;&nbsp;&nbsp;elif guess &lt; secret:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;print("もっと大きい数です")<br>&nbsp;&nbsp;&nbsp;&nbsp;else:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;print("もっと小さい数です")</div>
      <div class="example-explanation"><code>while True</code> は無限ループを作り、<code>break</code> で抜け出します。正解したときに <code>break</code> を呼ぶことでゲームが終了します。</div>
    </div>

    <div class="example-item">
      <div class="example-title">試行回数をカウントする</div>
      <div class="example-code">attempts = 0  # 試行回数の初期化<br><br>while True:<br>&nbsp;&nbsp;&nbsp;&nbsp;guess = int(input("数を入力: "))<br>&nbsp;&nbsp;&nbsp;&nbsp;attempts += 1  # 試行回数を1増やす<br>&nbsp;&nbsp;&nbsp;&nbsp;<br>&nbsp;&nbsp;&nbsp;&nbsp;if guess == secret:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;print(f"{attempts}回目で正解！")<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;break</div>
      <div class="example-explanation">ループの外で <code>attempts = 0</code> と初期化し、ループ内で <code>attempts += 1</code> とすることで、試行回数を数えられます。</div>
    </div>
  </section>

  <section class="section">
    <h2>🔧 判定関数の設計</h2>
    <p>ゲームロジックを関数に分けることで、コードが読みやすく、テストしやすくなります。判定ロジックを別関数に切り出すのは良い設計です。</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">判定関数の例</div>
      <div class="example-code">def check_guess(secret, guess):<br>&nbsp;&nbsp;&nbsp;&nbsp;if guess &lt; secret:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return "Too low"<br>&nbsp;&nbsp;&nbsp;&nbsp;elif guess &gt; secret:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return "Too high"<br>&nbsp;&nbsp;&nbsp;&nbsp;else:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return "Correct"<br><br># 使い方<br>print(check_guess(50, 30))  # Too low<br>print(check_guess(50, 70))  # Too high<br>print(check_guess(50, 50))  # Correct</div>
      <div class="example-explanation">判定ロジックを <code>check_guess()</code> 関数にまとめました。引数に「正解」と「予想」を受け取り、判定結果の文字列を返します。</div>
    </div>

    <div class="example-item">
      <div class="example-title">enumerate() を使ったループ</div>
      <div class="example-code">guesses = [30, 70, 50]<br><br>for i, guess in enumerate(guesses, 1):<br>&nbsp;&nbsp;&nbsp;&nbsp;result = check_guess(50, guess)<br>&nbsp;&nbsp;&nbsp;&nbsp;print(f"{i}回目: {guess} → {result}")<br>&nbsp;&nbsp;&nbsp;&nbsp;if result == "Correct":<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;print(f"{i}回で正解！")<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;break</div>
      <div class="example-explanation"><code>enumerate(guesses, 1)</code> は、リストの各要素とその番号（1から始まる）を同時に取得できます。試行回数の管理に便利です。</div>
    </div>
  </section>

  <section class="section">
    <h2>🏗️ ゲーム全体の設計</h2>
    <p>ゲームを関数に分割することで、コードを整理できます。以下は数当てゲームの全体構成の例です。</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">ゲーム全体の構成例</div>
      <div class="example-code">import random<br><br>def check_guess(secret, guess):<br>&nbsp;&nbsp;&nbsp;&nbsp;"""予想を判定して結果を返す""" <br>&nbsp;&nbsp;&nbsp;&nbsp;if guess &lt; secret:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return "Too low"<br>&nbsp;&nbsp;&nbsp;&nbsp;elif guess &gt; secret:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return "Too high"<br>&nbsp;&nbsp;&nbsp;&nbsp;else:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return "Correct"<br><br>def play_game():<br>&nbsp;&nbsp;&nbsp;&nbsp;"""ゲーム全体を管理する""" <br>&nbsp;&nbsp;&nbsp;&nbsp;secret = random.randint(1, 100)<br>&nbsp;&nbsp;&nbsp;&nbsp;attempts = 0<br>&nbsp;&nbsp;&nbsp;&nbsp;<br>&nbsp;&nbsp;&nbsp;&nbsp;while True:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;guess = int(input("1〜100の数を予想: "))<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;attempts += 1<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;result = check_guess(secret, guess)<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;print(result)<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;if result == "Correct":<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;print(f"{attempts}回で正解！")<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;break<br><br>play_game()</div>
      <div class="example-explanation">
        ゲームを2つの関数に分けました：<br>
        ・<code>check_guess()</code> ：1回の予想を判定する<br>
        ・<code>play_game()</code> ：ゲーム全体の流れを管理する<br>
        このように役割ごとに関数を分けると、コードが読みやすくなります。
      </div>
    </div>
  </section>

  <section class="section">
    <h2>💡 まとめ</h2>
    <ul>
      <li><code>random.randint(a, b)</code> で a 以上 b 以下のランダムな整数を生成できる</li>
      <li><code>while True</code> + <code>break</code> でゲームループを作れる</li>
      <li>判定ロジックを関数に分けるとコードが整理される</li>
      <li><code>enumerate()</code> を使うと、ループのインデックスと値を同時に取得できる</li>
      <li>試行回数はループ外で初期化し、ループ内でカウントアップする</li>
    </ul>
  </section>
