lesson:
  number: "06_01"
  id: "06_01_text_game"
  title: "Text-Based Game"

content: |
  <section class="section">
    <h2>🎮 Practical Project: Text-Based Game</h2>
    <p>Let's combine everything we've learned — functions, loops, conditionals, and lists — to build a real game program!</p>
    <p>In this lesson, we'll use a <strong>number guessing game</strong> to learn how to design and implement a complete program.</p>
  </section>

  <section class="section">
    <h2>🎲 Using Random Numbers - The random Module</h2>
    <p>Games often need random numbers. In Python, we use the <code>randint()</code> function from the <code>random</code> module to generate them.</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">How to Use random.randint()</div>
      <div class="example-code">import random<br><br># Generate a random integer between 1 and 100<br>number = random.randint(1, 100)<br>print(number)  # e.g., 42<br><br># Random integer between 1 and 6 (dice)<br>dice = random.randint(1, 6)<br>print(f"Dice roll: {dice}")</div>
      <div class="example-explanation"><code>random.randint(a, b)</code> returns a random integer <strong>between a and b, inclusive</strong>. Both endpoints are included.</div>
    </div>
  </section>

  <section class="section">
    <h2>🔁 The Game Loop Structure</h2>
    <p>The core of most games is "repeat until the player wins." We combine <code>while True</code> and <code>break</code> to create a game loop.</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">Basic Game Loop Structure</div>
      <div class="example-code">while True:<br>&nbsp;&nbsp;&nbsp;&nbsp;guess = int(input("Enter a number: "))<br>&nbsp;&nbsp;&nbsp;&nbsp;if guess == secret:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;print("Correct!")<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;break  # Exit the loop<br>&nbsp;&nbsp;&nbsp;&nbsp;elif guess &lt; secret:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;print("Too low")<br>&nbsp;&nbsp;&nbsp;&nbsp;else:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;print("Too high")</div>
      <div class="example-explanation"><code>while True</code> creates an infinite loop, and <code>break</code> exits it. When the player guesses correctly, <code>break</code> is called and the game ends.</div>
    </div>

    <div class="example-item">
      <div class="example-title">Counting Attempts</div>
      <div class="example-code">attempts = 0  # Initialize attempt counter<br><br>while True:<br>&nbsp;&nbsp;&nbsp;&nbsp;guess = int(input("Enter a number: "))<br>&nbsp;&nbsp;&nbsp;&nbsp;attempts += 1  # Increment counter<br>&nbsp;&nbsp;&nbsp;&nbsp;<br>&nbsp;&nbsp;&nbsp;&nbsp;if guess == secret:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;print(f"Correct on attempt {attempts}!")<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;break</div>
      <div class="example-explanation">Initialize <code>attempts = 0</code> before the loop and use <code>attempts += 1</code> inside to count how many guesses were made.</div>
    </div>
  </section>

  <section class="section">
    <h2>🔧 Designing a Judgment Function</h2>
    <p>Separating game logic into functions makes code more readable and testable. Extracting the judgment logic into its own function is good design practice.</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">Example Judgment Function</div>
      <div class="example-code">def check_guess(secret, guess):<br>&nbsp;&nbsp;&nbsp;&nbsp;if guess &lt; secret:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return "Too low"<br>&nbsp;&nbsp;&nbsp;&nbsp;elif guess &gt; secret:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return "Too high"<br>&nbsp;&nbsp;&nbsp;&nbsp;else:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return "Correct"<br><br># Usage<br>print(check_guess(50, 30))  # Too low<br>print(check_guess(50, 70))  # Too high<br>print(check_guess(50, 50))  # Correct</div>
      <div class="example-explanation">The judgment logic is encapsulated in <code>check_guess()</code>. It takes the secret number and a guess as arguments and returns the result as a string.</div>
    </div>

    <div class="example-item">
      <div class="example-title">Using enumerate() in a Loop</div>
      <div class="example-code">guesses = [30, 70, 50]<br><br>for i, guess in enumerate(guesses, 1):<br>&nbsp;&nbsp;&nbsp;&nbsp;result = check_guess(50, guess)<br>&nbsp;&nbsp;&nbsp;&nbsp;print(f"Attempt {i}: {guess} → {result}")<br>&nbsp;&nbsp;&nbsp;&nbsp;if result == "Correct":<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;print(f"Correct in {i} attempts!")<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;break</div>
      <div class="example-explanation"><code>enumerate(guesses, 1)</code> provides both each element and its number (starting from 1) simultaneously, making it convenient for tracking attempt counts.</div>
    </div>
  </section>

  <section class="section">
    <h2>🏗️ Full Game Design</h2>
    <p>Splitting the game into functions keeps the code organized. Here is an example of the overall structure of a number guessing game.</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">Complete Game Structure Example</div>
      <div class="example-code">import random<br><br>def check_guess(secret, guess):<br>&nbsp;&nbsp;&nbsp;&nbsp;"""Judge a guess and return the result"""<br>&nbsp;&nbsp;&nbsp;&nbsp;if guess &lt; secret:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return "Too low"<br>&nbsp;&nbsp;&nbsp;&nbsp;elif guess &gt; secret:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return "Too high"<br>&nbsp;&nbsp;&nbsp;&nbsp;else:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return "Correct"<br><br>def play_game():<br>&nbsp;&nbsp;&nbsp;&nbsp;"""Manage the entire game"""<br>&nbsp;&nbsp;&nbsp;&nbsp;secret = random.randint(1, 100)<br>&nbsp;&nbsp;&nbsp;&nbsp;attempts = 0<br>&nbsp;&nbsp;&nbsp;&nbsp;<br>&nbsp;&nbsp;&nbsp;&nbsp;while True:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;guess = int(input("Guess a number (1-100): "))<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;attempts += 1<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;result = check_guess(secret, guess)<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;print(result)<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;if result == "Correct":<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;print(f"You got it in {attempts} attempts!")<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;break<br><br>play_game()</div>
      <div class="example-explanation">
        The game is split into two functions:<br>
        · <code>check_guess()</code>: judges a single guess<br>
        · <code>play_game()</code>: manages the overall game flow<br>
        Separating responsibilities like this makes code much easier to read and maintain.
      </div>
    </div>
  </section>

  <section class="section">
    <h2>💡 Summary</h2>
    <ul>
      <li><code>random.randint(a, b)</code> generates a random integer between a and b (inclusive)</li>
      <li><code>while True</code> + <code>break</code> creates a game loop</li>
      <li>Extracting judgment logic into a function keeps code organized</li>
      <li><code>enumerate()</code> lets you get both the index and value in a loop simultaneously</li>
      <li>Initialize attempt counters before the loop and increment them inside</li>
    </ul>
  </section>
