solution_code: |
  def find_max(numbers):
      max_value = numbers[0]
      for num in numbers:
          if num > max_value:
              max_value = num
      return max_value

  print(find_max([3, 7, 2, 9, 1]))
  print(find_max([5]))
  print(find_max([-5, -2, -10, -1]))

