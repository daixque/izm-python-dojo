lesson:
  number: "02_02"
  id: "02_02_if_else"
  title: "else と elif"

content: |
  <section class="section">
    <h2>🔀 else 文</h2>
    <p>前回のレッスンでは <code>if</code> 文を学びました。今回は、条件が満たされなかった場合の処理を書く方法を学びます。</p>
    <p><code>else</code> 文を使うと、<code>if</code> の条件が <code>False</code> だった場合の処理を書けます。</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">else 文の基本</div>
      <div class="example-code">age = 15<br><br>if age >= 18:<br>&nbsp;&nbsp;&nbsp;&nbsp;print("大人です")<br>else:<br>&nbsp;&nbsp;&nbsp;&nbsp;print("子供です")</div>
      <div class="example-explanation">この例では、<code>age</code> が18以上でない場合（つまり18未満の場合）に「子供です」と表示されます。</div>
    </div>
  </section>

  <section class="section">
    <h2>🔀 elif 文 - 複数の条件分岐</h2>
    <p><code>elif</code>（else if の略）を使うと、複数の条件を順番にチェックできます。</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">elif を使った複数条件</div>
      <div class="example-code">score = 75<br><br>if score >= 90:<br>&nbsp;&nbsp;&nbsp;&nbsp;print("優秀です！")<br>elif score >= 70:<br>&nbsp;&nbsp;&nbsp;&nbsp;print("良好です")<br>elif score >= 60:<br>&nbsp;&nbsp;&nbsp;&nbsp;print("合格です")<br>else:<br>&nbsp;&nbsp;&nbsp;&nbsp;print("不合格です")</div>
      <div class="example-explanation">
        このコードは上から順番に条件をチェックします：
        <ul>
          <li>まず <code>score >= 90</code> をチェック（False）</li>
          <li>次に <code>score >= 70</code> をチェック（True！）→ 「良好です」と表示して終了</li>
          <li>以降の条件はチェックされません</li>
        </ul>
      </div>
    </div>
  </section>

  <section class="section">
    <h2>⚠️ 条件の優先順位</h2>
    <p><strong>重要：</strong> <code>elif</code> は上から順番に評価され、最初に <code>True</code> になった条件のブロックだけが実行されます。</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">❌ 間違った例</div>
      <div class="example-code">if score >= 60:<br>&nbsp;&nbsp;&nbsp;&nbsp;print("合格です")<br>elif score >= 90:<br>&nbsp;&nbsp;&nbsp;&nbsp;print("優秀です！")  # この条件には絶対到達しない！</div>
      <div class="example-explanation">90点の人は「合格です」と表示されるだけで、「優秀です！」は表示されません。なぜなら、最初の条件 <code>score >= 60</code> が True になってしまうからです。</div>
    </div>

    <div class="example-item">
      <div class="example-title">✓ 正しい例</div>
      <div class="example-code">if score >= 90:<br>&nbsp;&nbsp;&nbsp;&nbsp;print("優秀です！")<br>elif score >= 60:<br>&nbsp;&nbsp;&nbsp;&nbsp;print("合格です")</div>
      <div class="example-explanation"><strong>ポイント：</strong> より厳しい条件（数値が大きい条件）を先に書きましょう！</div>
    </div>
  </section>

  <section class="section">
    <h2>📊 フローチャート</h2>
    <p>条件分岐の流れを図で表したものを「フローチャート」と呼びます。</p>
    <div class="mermaid">
      flowchart TD
        Start([開始]) --> Cond1{条件1}
        Cond1 -->|Yes| ProcessA[処理A]
        Cond1 -->|No| Cond2{条件2}
        Cond2 -->|Yes| ProcessB[処理B]
        Cond2 -->|No| ElseBlock[elseの処理]
        ProcessA --> End([終了])
        ProcessB --> End
        ElseBlock --> End
    </div>
    <p>プログラムを書く前に、このような図を描いて考えると、複雑な条件分岐も整理しやすくなります。</p>
  </section>

  <section class="section">
    <h2>🎲 乱数の生成 - random モジュール</h2>
    <p>ゲームやシミュレーションでは、ランダムな数値が必要になることがあります。Pythonでは <code>random</code> モジュールを使います。</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">ランダムな整数の生成</div>
      <div class="example-code">import random<br><br># 1から6までのランダムな整数を生成<br>dice = random.randint(1, 6)<br>print(f"サイコロの目: {dice}")</div>
      <div class="example-explanation">
        <code>random.randint(a, b)</code> は、<code>a</code> 以上 <code>b</code> 以下のランダムな整数を返します。<br>
        <strong>注意：</strong> <code>import random</code> は、プログラムの最初に1回だけ書きます。
      </div>
    </div>

    <div class="example-item">
      <div class="example-title">じゃんけんの例</div>
      <div class="example-code">import random<br><br># 1:グー, 2:チョキ, 3:パー<br>computer = random.randint(1, 3)<br><br>if computer == 1:<br>&nbsp;&nbsp;&nbsp;&nbsp;print("コンピュータ: グー")<br>elif computer == 2:<br>&nbsp;&nbsp;&nbsp;&nbsp;print("コンピュータ: チョキ")<br>else:<br>&nbsp;&nbsp;&nbsp;&nbsp;print("コンピュータ: パー")</div>
      <div class="example-explanation">ランダムに生成された数値に応じて、異なる出力を行います。</div>
    </div>
  </section>

  <section class="section">
    <h2>🎯 まとめ</h2>
    <ul>
      <li><code>else</code>：if の条件が False の場合に実行される</li>
      <li><code>elif</code>：複数の条件を順番にチェックできる</li>
      <li>条件は上から順番に評価され、最初に True になった部分だけが実行される</li>
      <li>厳しい条件を先に書く</li>
      <li><code>random.randint(a, b)</code> でランダムな整数を生成できる</li>
    </ul>
    <p>次は演習課題に挑戦して、else と elif を使いこなせるようになりましょう！</p>
  </section>
