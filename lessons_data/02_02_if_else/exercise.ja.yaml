lesson:
  number: "02_02"
  id: "02_02_if_else"
  title: "else と elif"

task_description: |
  <p>じゃんけんゲームのプログラムを完成させましょう。</p>
  <p>コンピュータとじゃんけんをして、勝敗を判定するプログラムを作ります。</p>
  <h3>勝敗のルール</h3>
  <ul>
    <li>グー（1）はチョキ（2）に勝つ</li>
    <li>チョキ（2）はパー（3）に勝つ</li>
    <li>パー（3）はグー（1）に勝つ</li>
    <li>同じ手の場合は引き分け</li>
  </ul>

instructions:
  - "ユーザーに手を入力してもらう（1: グー、2: チョキ、3: パー）"
  - "コンピュータの手は既にランダムで生成されています"
  - "<code>judge_winner(user, computer)</code> 関数の中に勝敗判定のロジックを書く"
  - "関数は <code>\"あなたの勝ち！\"</code>、<code>\"コンピュータの勝ち！\"</code>、<code>\"引き分け！\"</code> のいずれかを返します"
  - "<code>elif</code> を使って、すべての勝ちパターンをチェックしましょう"
  - "テスト後、実際に遊びたい場合は下部のコメントを外してください"

hints:
  - hint: |
      まず引き分けの条件をチェックします：<br>
      <code>if user == computer:</code><br>
      このとき <code>return "引き分け！"</code> を返します
  - hint: |
      ユーザーが勝つパターンは3つあります：<br>
      1. ユーザーがグー（1）でコンピュータがチョキ（2）<br>
      2. ユーザーがチョキ（2）でコンピュータがパー（3）<br>
      3. ユーザーがパー（3）でコンピュータがグー（1）
  - hint: |
      複数の条件を or でつなぐことができます：<br>
      <code>if (user == 1 and computer == 2) or (user == 2 and computer == 3) or (user == 3 and computer == 1):</code><br>
      このとき <code>return "あなたの勝ち！"</code> を返します
  - hint: |
      引き分けとユーザーの勝ち以外は、すべてコンピュータの勝ちです。<br>
      最後に <code>else:</code> を使って <code>return "コンピュータの勝ち！"</code> を返しましょう
