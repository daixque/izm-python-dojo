lesson:
  number: "04_03"
  id: "04_03_list_loop"
  title: "for Loops and Lists"
description: "Learn how to combine for loops with lists to process and filter elements."

task_description: |
  <p>Implement the function <code>filter_even(numbers)</code>.</p>
  <p>It receives a list of integers <code>numbers</code> and returns a <strong>new list containing only the even numbers</strong>.</p>
  <h3>Examples</h3>
  <pre>filter_even([1, 2, 3, 4, 5, 6])  # [2, 4, 6]
  filter_even([1, 3, 5])            # []
  filter_even([10, 15, 20, 25])     # [10, 20]</pre>

instructions:
  - "An empty list <code>result = []</code> is already provided"
  - "Use a <code>for</code> loop to check each element of <code>numbers</code> in order"
  - "Check whether a number is even using <code>num % 2 == 0</code>"
  - "Add matching elements to the list using <code>result.append(num)</code>"
  - "Return the result at the end with <code>return result</code>"

hints:
  - hint: |
      Use a for loop to go through all elements:<br>
      <code>for num in numbers:</code><br>
      &nbsp;&nbsp;&nbsp;&nbsp;<code># check if num is even</code>
  - hint: |
      Use the <code>%</code> (remainder) operator to check for even numbers:<br>
      <code>if num % 2 == 0:</code><br>
      &nbsp;&nbsp;&nbsp;&nbsp;<code># num is even here</code>
  - hint: |
      Append matching elements to result:<br>
      <code>result.append(num)</code>
  - hint: |
      The completed function looks like this:<br>
      <code>for num in numbers:</code><br>
      &nbsp;&nbsp;&nbsp;&nbsp;<code>if num % 2 == 0:</code><br>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<code>result.append(num)</code>
