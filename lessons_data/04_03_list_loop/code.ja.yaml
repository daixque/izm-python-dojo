solution_code: |
  def filter_even(numbers):
      result = []
      for num in numbers:
          if num % 2 == 0:
              result.append(num)
      return result

  print(filter_even([1, 2, 3, 4, 5, 6]))
  print(filter_even([1, 3, 5]))
  print(filter_even([10, 15, 20, 25]))

