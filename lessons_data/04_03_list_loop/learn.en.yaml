lesson:
  number: "04_03"
  id: "04_03_list_loop"
  title: "for Loops and Lists"

content: |
  <section class="section">
    <h2>📋 Combining Lists and for Loops</h2>
    <p>By combining lists with for loops, you can process every element in a list.</p>
    <p>Instead of using <code>range()</code>, you can pass a list directly to a <code>for</code> loop.</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">Processing each element in a list</div>
      <div class="example-code">fruits = ["apple", "banana", "cherry"]<br>for fruit in fruits:<br>&nbsp;&nbsp;&nbsp;&nbsp;print(fruit)<br># Output:<br># apple<br># banana<br># cherry</div>
      <div class="example-explanation">
        Writing <code>for fruit in fruits:</code> assigns each element of the <code>fruits</code> list to <code>fruit</code> in order.<br>
        The loop variable name (here <code>fruit</code>) can be anything you choose.
      </div>
    </div>

    <div class="example-item">
      <div class="example-title">Calculations with a number list</div>
      <div class="example-code">numbers = [10, 20, 30, 40, 50]<br>for num in numbers:<br>&nbsp;&nbsp;&nbsp;&nbsp;print(num * 2)<br># Output:<br># 20<br># 40<br># 60<br># 80<br># 100</div>
      <div class="example-explanation">
        It works the same way for a list of numbers. For each element <code>num</code>, it calculates and prints <code>num * 2</code>.
      </div>
    </div>
  </section>

  <section class="section">
    <h2>🔢 Index-based Loops with enumerate()</h2>
    <p>When you want both the value of an element and its position (index), use <code>enumerate()</code>.</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">Basic enumerate()</div>
      <div class="example-code">fruits = ["apple", "banana", "cherry"]<br>for i, fruit in enumerate(fruits):<br>&nbsp;&nbsp;&nbsp;&nbsp;print(f"{i}: {fruit}")<br># Output:<br># 0: apple<br># 1: banana<br># 2: cherry</div>
      <div class="example-explanation">
        <code>enumerate(fruits)</code> returns <code>(index, element)</code> pairs in order.<br>
        <code>i</code> is the index (starting at 0) and <code>fruit</code> is the element value.
      </div>
    </div>

    <div class="example-item">
      <div class="example-title">enumerate() starting from 1</div>
      <div class="example-code">fruits = ["apple", "banana", "cherry"]<br>for i, fruit in enumerate(fruits, start=1):<br>&nbsp;&nbsp;&nbsp;&nbsp;print(f"#{i}: {fruit}")<br># Output:<br># #1: apple<br># #2: banana<br># #3: cherry</div>
      <div class="example-explanation">
        Using <code>enumerate(fruits, start=1)</code> makes the index start at 1 instead of 0.
      </div>
    </div>
  </section>

  <section class="section">
    <h2>🔍 Collecting Elements That Match a Condition</h2>
    <p>A common pattern is to start with an empty list and use <code>append()</code> to add only the elements that meet a condition.</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">Collecting only even numbers</div>
      <div class="example-code">numbers = [1, 2, 3, 4, 5, 6]<br>evens = []<br>for num in numbers:<br>&nbsp;&nbsp;&nbsp;&nbsp;if num % 2 == 0:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;evens.append(num)<br>print(evens)  # [2, 4, 6]</div>
      <div class="example-explanation">
        <ol>
          <li>Prepare an empty list: <code>evens = []</code></li>
          <li>Check each element <code>num</code> with an <code>if</code> statement</li>
          <li>Add matching elements with <code>evens.append(num)</code></li>
        </ol>
        <code>num % 2 == 0</code> means "the remainder when num is divided by 2 is 0 (even number)".
      </div>
    </div>

    <div class="example-item">
      <div class="example-title">Collecting elements above a threshold</div>
      <div class="example-code">scores = [55, 72, 88, 43, 91, 67]<br>high_scores = []<br>for score in scores:<br>&nbsp;&nbsp;&nbsp;&nbsp;if score >= 70:<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;high_scores.append(score)<br>print(high_scores)  # [72, 88, 91]</div>
      <div class="example-explanation">
        This collects only scores of 70 or above into the <code>high_scores</code> list.<br>
        This pattern is called "filtering".
      </div>
    </div>
  </section>

  <section class="section">
    <h2>✨ Introduction to List Comprehensions</h2>
    <p>Loops that build lists can also be written more concisely using <strong>list comprehensions</strong>.</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">Creating a list with doubled values</div>
      <div class="example-code"># Regular loop<br>numbers = [1, 2, 3, 4, 5]<br>doubled = []<br>for x in numbers:<br>&nbsp;&nbsp;&nbsp;&nbsp;doubled.append(x * 2)<br><br># List comprehension<br>doubled = [x * 2 for x in numbers]<br>print(doubled)  # [2, 4, 6, 8, 10]</div>
      <div class="example-explanation">
        Write it as <code>[expression for variable in list]</code>.<br>
        You can create a list in one line, making your code shorter.
      </div>
    </div>

    <div class="example-item">
      <div class="example-title">List comprehension with a condition</div>
      <div class="example-code">numbers = [1, 2, 3, 4, 5, 6]<br>evens = [x for x in numbers if x % 2 == 0]<br>print(evens)  # [2, 4, 6]</div>
      <div class="example-explanation">
        Using <code>[expression for variable in list if condition]</code>, you can filter in one line too.
      </div>
    </div>
  </section>

  <section class="section">
    <h2>💡 Summary</h2>
    <ul>
      <li><code>for item in list:</code> processes each element of a list in order</li>
      <li><code>enumerate(list)</code> lets you get the index and element at the same time</li>
      <li>The empty list + <code>append()</code> pattern collects elements that match a condition</li>
      <li><code>num % 2 == 0</code> checks whether a number is even</li>
      <li><code>[expression for variable in list]</code> is the list comprehension shorthand</li>
    </ul>
  </section>
