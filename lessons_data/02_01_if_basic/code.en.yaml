initial_code: |
  # Program to determine if a number is positive, negative, or zero
  

solution_code: |
  num = int(input("Enter a number: "))
  if num > 0:
      print("Positive number")
  elif num < 0:
      print("Negative number")
  else:
      print("Zero")

initial_files: []

tests:
  - name: "Test 1: Using input()"
    description: "Check if input() is used to get a number"
    inputs:
      - "5"
    code: |
      import sys
      from io import StringIO
      
      try:
          # Check if input() is used
          if 'input(' not in user_code:
              result = {"passed": False, "message": "✗ Please use the input() function"}
          else:
              result = {"passed": True, "message": "✓ input() function is used"}
      except Exception as e:
          result = {"passed": False, "message": f"✗ Error occurred: {str(e)}"}
      
      result

  - name: "Test 2: Correctly identifies positive numbers"
    description: "When 5 is entered, it should display 'positive'"
    code: |
      import sys
      import builtins
      from io import StringIO

      old_stdout = sys.stdout
      old_input = builtins.input
      try:
          sys.stdout = StringIO()
          builtins.input = lambda *args: "5"

          exec_globals = {}
          exec(user_code, exec_globals)

          output = sys.stdout.getvalue()
          sys.stdout = old_stdout
          builtins.input = old_input

          if "positive" in output.lower():
              result = {"passed": True, "message": "✓ Correctly identifies positive numbers"}
          else:
              result = {"passed": False, "message": f"✗ For positive number (5), display 'Positive number'\nActual output: {output}"}
      except Exception as e:
          sys.stdout = old_stdout
          builtins.input = old_input
          result = {"passed": False, "message": f"✗ Error occurred: {str(e)}"}

      result

