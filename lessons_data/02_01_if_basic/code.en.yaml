initial_code: |
  # Program to determine if a number is positive, negative, or zero
  

initial_files: []

tests:
  - name: "Test 1: Using input()"
    description: "Check if input() is used to get a number"
    inputs:
      - "5"
    code: |
      import sys
      from io import StringIO
      
      try:
          # Check if input() is used
          if 'input(' not in user_code:
              result = {"passed": False, "message": "✗ Please use the input() function"}
          else:
              result = {"passed": True, "message": "✓ input() function is used"}
      except Exception as e:
          result = {"passed": False, "message": f"✗ Error occurred: {str(e)}"}
      
      result

  - name: "Test 2: Correctly identifies positive numbers"
    description: "When 5 is entered, it should display 'positive'"
    inputs:
      - "5"
    code: |
      import sys
      from io import StringIO
      
      try:
          # Capture output
          old_stdout = sys.stdout
          sys.stdout = StringIO()
          
          exec_globals = {}
          exec(user_code, exec_globals)
          
          output = sys.stdout.getvalue()
          sys.stdout = old_stdout
          
          # Check if "positive" or "Positive" is in output
          if "positive" in output.lower():
              result = {"passed": True, "message": "✓ Correctly identifies positive numbers"}
          else:
              result = {"passed": False, "message": f"✗ For positive number (5), display 'Positive number'\nActual output: {output}"}
      except Exception as e:
          sys.stdout = old_stdout
          result = {"passed": False, "message": f"✗ Error occurred: {str(e)}"}
      
      result

  - name: "Test 3: Correctly identifies negative numbers"
    description: "When -3 is entered, it should display 'negative'"
    inputs:
      - "-3"
    code: |
      import sys
      from io import StringIO
      
      try:
          # Capture output
          old_stdout = sys.stdout
          sys.stdout = StringIO()
          
          exec_globals = {}
          exec(user_code, exec_globals)
          
          output = sys.stdout.getvalue()
          sys.stdout = old_stdout
          
          # Check if "negative" or "Negative" is in output
          if "negative" in output.lower():
              result = {"passed": True, "message": "✓ Correctly identifies negative numbers"}
          else:
              result = {"passed": False, "message": f"✗ For negative number (-3), display 'Negative number'\nActual output: {output}"}
      except Exception as e:
          sys.stdout = old_stdout
          result = {"passed": False, "message": f"✗ Error occurred: {str(e)}"}
      
      result

  - name: "Test 4: Correctly identifies zero"
    description: "When 0 is entered, it should display 'zero'"
    inputs:
      - "0"
    code: |
      import sys
      from io import StringIO
      
      try:
          # Capture output
          old_stdout = sys.stdout
          sys.stdout = StringIO()
          
          exec_globals = {}
          exec(user_code, exec_globals)
          
          output = sys.stdout.getvalue()
          sys.stdout = old_stdout
          
          # Check if "0" or "zero" is in output
          if "0" in output or "zero" in output.lower():
              result = {"passed": True, "message": "✓ Correctly identifies zero"}
          else:
              result = {"passed": False, "message": f"✗ For 0, display 'Zero' or '0'\nActual output: {output}"}
      except Exception as e:
