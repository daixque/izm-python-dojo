tests:
  - name: "コードがエラーなく実行できるか"
    description: "グラフ描画コードが正しく実行されるか確認する"
    code: |
      try:
          import matplotlib
          matplotlib.use('agg')
          import matplotlib.pyplot as plt
          from unittest.mock import patch
          with patch('matplotlib.pyplot.show'):
              exec_globals = {}
              exec(user_code, exec_globals)
          result = {"passed": True, "message": "✓ コードがエラーなく実行されました"}
      except Exception as e:
          result = {"passed": False, "message": f"✗ 実行エラー: {str(e)}"}
      result

  - name: "plt.plot() が2回呼ばれているか"
    description: "2つのデータ系列がプロットされているか確認する"
    code: |
      try:
          import matplotlib
          matplotlib.use('agg')
          import matplotlib.pyplot as plt
          from unittest.mock import patch
          plot_calls = []
          orig_plot = plt.plot
          def mock_plot(*args, **kwargs):
              plot_calls.append((args, kwargs))
              return orig_plot(*args, **kwargs)
          with patch('matplotlib.pyplot.show'):
              with patch('matplotlib.pyplot.plot', side_effect=mock_plot):
                  exec_globals = {}
                  exec(user_code, exec_globals)
          if len(plot_calls) >= 2:
              result = {"passed": True, "message": f"✓ plt.plot() が {len(plot_calls)} 回呼ばれています"}
          else:
              result = {"passed": False, "message": f"✗ plt.plot() を2回呼んでください（現在: {len(plot_calls)} 回）"}
      except Exception as e:
          result = {"passed": False, "message": f"✗ エラー: {str(e)}"}
      result

