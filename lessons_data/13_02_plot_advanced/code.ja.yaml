initial_code: |
  import matplotlib.pyplot as plt

  # データ（1〜12月の気温と降水量）
  months = list(range(1, 13))
  temperature = [5, 6, 10, 15, 20, 24, 28, 29, 25, 19, 13, 7]
  rainfall = [50, 55, 110, 130, 140, 160, 180, 150, 200, 140, 90, 60]

  # ここにコードを書いてください
  # plt.plot() で気温の折れ線グラフを描く（label="Temperature (°C)"）
  # plt.plot() で降水量の折れ線グラフを描く（label="Rainfall (mm)"）
  # plt.title() でタイトルを "Monthly Temperature and Rainfall" に設定
  # plt.xlabel() でx軸ラベルを "Month" に設定
  # plt.legend() で凡例を表示
  # plt.grid(True) でグリッド線を表示
  # plt.show() でグラフを表示

solution_code: |
  import matplotlib.pyplot as plt

  months = list(range(1, 13))
  temperature = [5, 6, 10, 15, 20, 24, 28, 29, 25, 19, 13, 7]
  rainfall = [50, 55, 110, 130, 140, 160, 180, 150, 200, 140, 90, 60]

  plt.plot(months, temperature, label="Temperature (°C)")
  plt.plot(months, rainfall, label="Rainfall (mm)")
  plt.title("Monthly Temperature and Rainfall")
  plt.xlabel("Month")
  plt.legend()
  plt.grid(True)
  plt.show()

