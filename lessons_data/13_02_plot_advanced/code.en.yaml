  rainfall = [50, 55, 110, 130, 140, 160, 180, 150, 200, 140, 90, 60]

  # Write your code here:
  # Use plt.plot() to draw a line chart for temperature (label="Temperature (°C)")
  # Use plt.plot() to draw a line chart for rainfall (label="Rainfall (mm)")
  # Use plt.title() to set the title to "Monthly Temperature and Rainfall"
  # Use plt.xlabel() to set the x-axis label to "Month"
