tests:
  - name: "Code runs without errors"
    description: "Check that the chart drawing code executes correctly"
    code: |
      try:
          import matplotlib
          matplotlib.use('agg')
          import matplotlib.pyplot as plt
          from unittest.mock import patch
          with patch('matplotlib.pyplot.show'):
              exec_globals = {}
              exec(user_code, exec_globals)
          result = {"passed": True, "message": "✓ Code executed without errors"}
      except Exception as e:
          result = {"passed": False, "message": f"✗ Execution error: {str(e)}"}
      result

  - name: "plt.plot() is called twice"
    description: "Check that two data series are plotted"
    code: |
      try:
          import matplotlib
          matplotlib.use('agg')
          import matplotlib.pyplot as plt
          from unittest.mock import patch
          plot_calls = []
          orig_plot = plt.plot
          def mock_plot(*args, **kwargs):
              plot_calls.append((args, kwargs))
              return orig_plot(*args, **kwargs)
          with patch('matplotlib.pyplot.show'):
              with patch('matplotlib.pyplot.plot', side_effect=mock_plot):
                  exec_globals = {}
                  exec(user_code, exec_globals)
          if len(plot_calls) >= 2:
              result = {"passed": True, "message": f"✓ plt.plot() is called {len(plot_calls)} times"}
          else:
              result = {"passed": False, "message": f"✗ Call plt.plot() twice — once for each data series (current: {len(plot_calls)} time(s))"}
      except Exception as e:
          result = {"passed": False, "message": f"✗ Error: {str(e)}"}
      result

