solution_code: |
  class Animal:
      def __init__(self, name, sound):
          self.name = name
          self.sound = sound

      def speak(self):
          return f"{self.name}は{self.sound}と鳴きます"

  dog = Animal("犬", "ワン")
  print(dog.speak())

  cat = Animal("猫", "ニャー")
  print(cat.speak())

