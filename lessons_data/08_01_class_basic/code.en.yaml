solution_code: |
  class Animal:
      def __init__(self, name, sound):
          self.name = name
          self.sound = sound

      def speak(self):
          return f"{self.name} says {self.sound}"

  dog = Animal("Dog", "Woof")
  print(dog.speak())

  cat = Animal("Cat", "Meow")
  print(cat.speak())

