lesson:
  number: "08_01"
  id: "08_01_class_basic"
  title: "Class Basics"

content: |
  <section class="section">
    <h2>🧱 What Are Classes and Objects?</h2>
    <p>In programming, there are times when you want to group related data and operations together.</p>
    <p>A <strong>class</strong> is like a "blueprint" that defines both data (attributes) and actions (methods) together.</p>
    <p>An <strong>object</strong> is an "instance" — a real thing created from that blueprint.</p>
    <p>For example, you can define a "Dog" class and then create individual dog objects like "Pochi" and "Taro".</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">The class and object concept</div>
      <div class="example-code"># Class = blueprint<br>class Dog:<br>&nbsp;&nbsp;&nbsp;&nbsp;pass<br><br># Objects = instances created from the blueprint<br>dog1 = Dog()&nbsp;&nbsp;# "Pochi"<br>dog2 = Dog()&nbsp;&nbsp;# "Taro"</div>
      <div class="example-explanation">
        From the <code>Dog</code> class blueprint, you can create separate objects <code>dog1</code> and <code>dog2</code>.<br>
        Each one is an independent entity.
      </div>
    </div>
  </section>

  <section class="section">
    <h2>📝 Defining a Class</h2>
    <p>In Python, use the <code>class</code> keyword to define a class.</p>
    <p>By convention, class names start with a capital letter (e.g., <code>Dog</code>, <code>Animal</code>).</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">Basic class syntax</div>
      <div class="example-code">class ClassName:<br>&nbsp;&nbsp;&nbsp;&nbsp;def method_name(self):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;# code</div>
      <div class="example-explanation">
        <strong>Key points:</strong><br>
        - Write the class name after <code>class</code><br>
        - Class names start with a capital letter (convention)<br>
        - Add <code>:</code> at the end of the line<br>
        - Definitions inside the class are indented (4 spaces)
      </div>
    </div>
  </section>

  <section class="section">
    <h2>⚙️ The __init__ Constructor</h2>
    <p><code>__init__</code> is a special method called a "constructor".</p>
    <p>It is called automatically when an object is created, and is used for initial setup.</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">Using __init__</div>
      <div class="example-code">class Dog:<br>&nbsp;&nbsp;&nbsp;&nbsp;def __init__(self, name, breed):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.name = name<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.breed = breed<br><br>dog = Dog("Pochi", "Shiba Inu")<br>print(dog.name)&nbsp;&nbsp;&nbsp;# Pochi<br>print(dog.breed)&nbsp;&nbsp;# Shiba Inu</div>
      <div class="example-explanation">
        <code>self.name = name</code> sets an <strong>attribute (instance variable)</strong> called <code>name</code>.<br>
        <code>self</code> refers to "this object itself".
      </div>
    </div>

    <div class="example-item">
      <div class="example-title">Creating multiple objects</div>
      <div class="example-code">class Dog:<br>&nbsp;&nbsp;&nbsp;&nbsp;def __init__(self, name, breed):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.name = name<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.breed = breed<br><br>dog1 = Dog("Pochi", "Shiba Inu")<br>dog2 = Dog("Taro", "Toy Poodle")<br><br>print(dog1.name)&nbsp;&nbsp;# Pochi<br>print(dog2.name)&nbsp;&nbsp;# Taro</div>
      <div class="example-explanation">
        You can create as many objects with different data as you want from the same class.<br>
        Each object is independent.
      </div>
    </div>
  </section>

  <section class="section">
    <h2>🔧 Defining Methods</h2>
    <p>A function defined inside a class is called a <strong>method</strong>.</p>
    <p>The first parameter of a method must always be <code>self</code> (this object itself).</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">A class with methods</div>
      <div class="example-code">class Dog:<br>&nbsp;&nbsp;&nbsp;&nbsp;def __init__(self, name, breed):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.name = name<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.breed = breed<br><br>&nbsp;&nbsp;&nbsp;&nbsp;def bark(self):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;print(f"{self.name}: Woof!")<br><br>dog = Dog("Pochi", "Shiba Inu")<br>dog.bark()&nbsp;&nbsp;# Pochi: Woof!</div>
      <div class="example-explanation">
        Call a method with <code>dog.bark()</code>.<br>
        Inside a method, you can access attributes with <code>self.name</code>.
      </div>
    </div>

    <div class="example-item">
      <div class="example-title">A method with a return value</div>
      <div class="example-code">class Rectangle:<br>&nbsp;&nbsp;&nbsp;&nbsp;def __init__(self, width, height):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.width = width<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.height = height<br><br>&nbsp;&nbsp;&nbsp;&nbsp;def area(self):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return self.width * self.height<br><br>rect = Rectangle(4, 5)<br>print(rect.area())&nbsp;&nbsp;# 20</div>
      <div class="example-explanation">
        Methods can return values with <code>return</code>, just like regular functions.
      </div>
    </div>
  </section>

  <section class="section">
    <h2>💡 Summary</h2>
    <ul>
      <li>A <strong>class</strong> is a "blueprint" that groups data and actions</li>
      <li>An <strong>object</strong> is an "instance" created from a class</li>
      <li>Define a class with <code>class ClassName:</code></li>
      <li><code>__init__</code> is the constructor, called automatically when an object is created</li>
      <li>Set attributes with <code>self.attribute_name = value</code></li>
      <li>Create an object (instantiate) by writing the class name followed by <code>()</code></li>
    </ul>
  </section>
