solution_code: |
  def get_element(fruits, index):
      if 0 <= index < len(fruits):
          return fruits[index]
      else:
          return None

  # Test run
  print(get_element(["apple", "banana", "orange"], 0))
  print(get_element(["apple", "banana", "orange"], 2))
  print(get_element(["apple", "banana"], 5))

