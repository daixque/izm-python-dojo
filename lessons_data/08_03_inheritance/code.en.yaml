solution_code: |
  class Shape:
      def __init__(self, name):
          self.name = name

      def area(self):
          return 0

  class Rectangle(Shape):
      def __init__(self, width, height):
          super().__init__("Rectangle")
          self.width = width
          self.height = height

      def area(self):
          return self.width * self.height

  r = Rectangle(4, 5)
  print(r.area())
  print(isinstance(r, Shape))
  print(isinstance(r, Rectangle))

