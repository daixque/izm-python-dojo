lesson:
  number: "08_03"
  id: "08_03_inheritance"
  title: "Inheritance"

content: |
  <section class="section">
    <h2>🧬 What Is Inheritance?</h2>
    <p><strong>Inheritance</strong> is a mechanism for creating a new class by inheriting the features of an existing class.</p>
    <p>The class being inherited from is called the <strong>parent class (superclass)</strong>, and the class that inherits is called the <strong>child class (subclass)</strong>.</p>
    <p>The child class can use the methods and attributes of the parent class directly.</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">The concept of inheritance</div>
      <div class="example-code">class Animal:&nbsp;&nbsp;# parent class<br>&nbsp;&nbsp;&nbsp;&nbsp;def breathe(self):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;print("breathing")<br><br>class Dog(Animal):&nbsp;&nbsp;# inherits from Animal<br>&nbsp;&nbsp;&nbsp;&nbsp;def bark(self):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;print("Woof!")<br><br>dog = Dog()<br>dog.breathe()&nbsp;&nbsp;# parent class method works<br>dog.bark()&nbsp;&nbsp;&nbsp;&nbsp;# child class method</div>
      <div class="example-explanation">
        The <code>(Animal)</code> in <code>class Dog(Animal):</code> means "inherit from Animal".<br>
        The <code>Dog</code> class can use all methods from the <code>Animal</code> class.
      </div>
    </div>
  </section>

  <section class="section">
    <h2>⬆️ Calling the Parent Class with super()</h2>
    <p>Using <code>super()</code>, you can call a method from the parent class inside a child class.</p>
    <p>This is especially common in <code>__init__</code>.</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">Using super() in __init__</div>
      <div class="example-code">class Animal:<br>&nbsp;&nbsp;&nbsp;&nbsp;def __init__(self, name):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.name = name<br><br>class Dog(Animal):<br>&nbsp;&nbsp;&nbsp;&nbsp;def __init__(self, name, breed):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;super().__init__(name)&nbsp;&nbsp;# call parent's __init__<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.breed = breed<br><br>dog = Dog("Pochi", "Shiba Inu")<br>print(dog.name)&nbsp;&nbsp;&nbsp;# Pochi (set by parent)<br>print(dog.breed)&nbsp;&nbsp;# Shiba Inu (set by child)</div>
      <div class="example-explanation">
        <code>super().__init__(name)</code> calls the parent class's <code>__init__</code>.<br>
        This ensures the parent's initialization runs too.
      </div>
    </div>
  </section>

  <section class="section">
    <h2>🔄 Method Overriding</h2>
    <p>If you define a method in a child class with the same name as one in the parent class, the child class's method <strong>overrides</strong> (replaces) it.</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">Method overriding</div>
      <div class="example-code">class Shape:<br>&nbsp;&nbsp;&nbsp;&nbsp;def area(self):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return 0<br><br>class Circle(Shape):<br>&nbsp;&nbsp;&nbsp;&nbsp;def __init__(self, radius):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.radius = radius<br><br>&nbsp;&nbsp;&nbsp;&nbsp;def area(self):&nbsp;&nbsp;# override<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return self.radius ** 2 * 3.14<br><br>s = Shape()<br>print(s.area())&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;# 0 (parent's area)<br>c = Circle(5)<br>print(c.area())&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;# 78.5 (child's area)</div>
      <div class="example-explanation">
        By redefining <code>area()</code> in <code>Circle</code>, it overrides <code>Shape</code>'s <code>area()</code>.<br>
        When called on a <code>Circle</code> object, the overriding version is used.
      </div>
    </div>

    <div class="example-item">
      <div class="example-title">Override while also calling the parent</div>
      <div class="example-code">class Animal:<br>&nbsp;&nbsp;&nbsp;&nbsp;def describe(self):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return "I am an animal"<br><br>class Dog(Animal):<br>&nbsp;&nbsp;&nbsp;&nbsp;def describe(self):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;parent = super().describe()<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return f"{parent}. I am a dog."<br><br>dog = Dog()<br>print(dog.describe())&nbsp;&nbsp;# I am an animal. I am a dog.</div>
      <div class="example-explanation">
        Using <code>super().describe()</code>, you can call the parent's method while also adding more behavior.
      </div>
    </div>
  </section>

  <section class="section">
    <h2>🔍 Checking Types with isinstance()</h2>
    <p><code>isinstance(object, Class)</code> checks whether an object is an instance of that class.</p>
    <p>Inheritance relationships are also taken into account.</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">Using isinstance</div>
      <div class="example-code">class Animal:<br>&nbsp;&nbsp;&nbsp;&nbsp;pass<br><br>class Dog(Animal):<br>&nbsp;&nbsp;&nbsp;&nbsp;pass<br><br>dog = Dog()<br>print(isinstance(dog, Dog))&nbsp;&nbsp;&nbsp;&nbsp;# True<br>print(isinstance(dog, Animal))&nbsp;&nbsp;# True (inheritance)<br>print(isinstance(dog, int))&nbsp;&nbsp;&nbsp;&nbsp;# False</div>
      <div class="example-explanation">
        Because <code>Dog</code> inherits from <code>Animal</code>, <code>isinstance(dog, Animal)</code> also returns <code>True</code>.
      </div>
    </div>
  </section>

  <section class="section">
    <h2>💡 Summary</h2>
    <ul>
      <li><strong>Inheritance</strong> creates a new class that inherits features from a parent class</li>
      <li>Define inheritance with <code>class ChildClass(ParentClass):</code></li>
      <li>Use <code>super()</code> to call a method from the parent class</li>
      <li><strong>Method overriding</strong>: a child class can replace a parent class's method</li>
      <li><code>isinstance(obj, Class)</code> checks the type of an object</li>
    </ul>
  </section>
