tests:
  - name: "2の段の確認"
    description: "print_multiplication_table(2) が 2の段を正しく9行表示するか"
    code: |
      import io
      import sys
      try:
          exec_globals = {}
          exec(user_code, exec_globals)

          if 'print_multiplication_table' not in exec_globals:
              result = {"passed": False, "message": "✗ 関数 print_multiplication_table が定義されていません"}
          else:
              old_stdout = sys.stdout
              sys.stdout = buffer = io.StringIO()
              exec_globals['print_multiplication_table'](2)
              output = buffer.getvalue()
              sys.stdout = old_stdout

              lines = output.strip().split('\n')
              expected = [f"2 × {i} = {2 * i}" for i in range(1, 10)]

              if lines == expected:
                  result = {"passed": True, "message": "✓ 2の段が正しく表示されました"}
              else:
                  result = {"passed": False, "message": f"✗ 2の段が正しくありません。\n期待される出力:\n" + "\n".join(expected) + f"\n\n実際の出力:\n{output.strip()}"}
      except Exception as e:
          sys.stdout = sys.__stdout__
          result = {"passed": False, "message": f"✗ エラー: {str(e)}"}
      result

