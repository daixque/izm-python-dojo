solution_code: |
  import pandas as pd

  def passing_average(df, score_col, threshold=60):
      passing = df[df[score_col] >= threshold]
      return passing[score_col].mean()

  test_df = pd.DataFrame({"score": [50, 70, 80, 40, 90]})
  print(passing_average(test_df, "score", threshold=60))

