lesson:
  number: "15_01"
  id: "15_01_advanced_project"
  title: "Comprehensive Project: Grade Management System"
description: "Implement a grade management system by combining classes, sqlite3, and exception handling."

task_description: |
  <p>Complete the <code>StudentDB</code> class.</p>
  <p>This class uses a SQLite database to manage student names and test scores.</p>
  <h3>Methods to Implement</h3>
  <ul>
    <li><code>__init__(self)</code>: Create an in-memory database and set up the <code>students</code> table</li>
    <li><code>add_student(self, name, scores)</code>: Accept a student name and a list of scores, and insert each score into the database</li>
    <li><code>get_average(self, name)</code>: Return the average score for the given student. Raise <code>ValueError</code> if the student does not exist</li>
    <li><code>top_students(self, n)</code>: Return a list of <code>(name, average)</code> tuples for the top <code>n</code> students, sorted by average score descending</li>
  </ul>
  <h3>Example Output</h3>
  <pre>  db = StudentDB()
  db.add_student("Alice", [85, 90, 88])
  db.add_student("Bob", [70, 75, 80])
  db.add_student("Charlie", [95, 92, 98])

  print(db.get_average("Alice"))   # 87.666...
  print(db.top_students(2))        # [('Charlie', 95.0), ('Alice', 87.666...)]</pre>

instructions:
  - "<code>__init__</code>: Connect using <code>sqlite3.connect(\":memory:\")</code> and execute <code>CREATE TABLE students (name TEXT, score REAL)</code>"
  - "<code>add_student</code>: Loop through the <code>scores</code> list and insert each score using <code>INSERT INTO students VALUES (?, ?)</code>"
  - "<code>get_average</code>: Use <code>SELECT AVG(score) FROM students WHERE name = ?</code> to get the average; if the result is <code>None</code>, <code>raise ValueError</code>"
  - "<code>top_students</code>: Use <code>GROUP BY name ORDER BY avg DESC LIMIT ?</code> to fetch the top <code>n</code> students and return the result of <code>fetchall()</code>"

hints:
  - hint: |
      Example implementation of <code>__init__</code>:<br>
      <code>self.conn = sqlite3.connect(":memory:")</code><br>
      <code>cursor = self.conn.cursor()</code><br>
      <code>cursor.execute("CREATE TABLE students (name TEXT, score REAL)")</code><br>
      <code>self.conn.commit()</code>
  - hint: |
      Example implementation of <code>add_student</code>:<br>
      <code>cursor = self.conn.cursor()</code><br>
      <code>for score in scores:</code><br>
      &nbsp;&nbsp;&nbsp;&nbsp;<code>cursor.execute("INSERT INTO students VALUES (?, ?)", (name, score))</code><br>
      <code>self.conn.commit()</code>
  - hint: |
      Example implementation of <code>get_average</code>:<br>
      <code>cursor = self.conn.cursor()</code><br>
      <code>cursor.execute("SELECT AVG(score) FROM students WHERE name = ?", (name,))</code><br>
      <code>result = cursor.fetchone()[0]</code><br>
      <code>if result is None:</code><br>
      &nbsp;&nbsp;&nbsp;&nbsp;<code>raise ValueError(f"Student not found: {name}")</code><br>
      <code>return result</code>
