solution_code: |
  import sqlite3

  class StudentDB:
      def __init__(self):
          self.conn = sqlite3.connect(":memory:")
          cursor = self.conn.cursor()
          cursor.execute("CREATE TABLE students (name TEXT, score REAL)")
          self.conn.commit()

      def add_student(self, name, scores):
          cursor = self.conn.cursor()
          for score in scores:
              cursor.execute("INSERT INTO students VALUES (?, ?)", (name, score))
          self.conn.commit()

      def get_average(self, name):
          cursor = self.conn.cursor()
          cursor.execute("SELECT AVG(score) FROM students WHERE name = ?", (name,))
          result = cursor.fetchone()[0]
          if result is None:
              raise ValueError(f"Student not found: {name}")
          return result

      def top_students(self, n):
          cursor = self.conn.cursor()
          cursor.execute(
              "SELECT name, AVG(score) as avg FROM students GROUP BY name ORDER BY avg DESC LIMIT ?",
              (n,)
          )
          return cursor.fetchall()

  # Test it out
  db = StudentDB()
  db.add_student("Alice", [85, 90, 88])
  db.add_student("Bob", [70, 75, 80])
  db.add_student("Charlie", [95, 92, 98])
  print(db.get_average("Alice"))
  print(db.top_students(2))

