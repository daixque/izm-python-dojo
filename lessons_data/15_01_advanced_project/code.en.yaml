              cursor = db.conn.cursor()
              cursor.execute("SELECT * FROM students")
              result = {"passed": True, "message": "✓ students table was created successfully"}
      except Exception as e:
          result = {"passed": False, "message": f"✗ Error: {str(e)}"}
      result

  - name: "Check add_student and get_average"
    description: "Can we add a student and retrieve the correct average?"
    code: |
      try:
          import sqlite3
          exec_globals = {}
          exec(user_code, exec_globals)
          if 'StudentDB' not in exec_globals:
              result = {"passed": False, "message": "✗ StudentDB class is not defined"}
          else:
              db = exec_globals['StudentDB']()
              db.add_student("Alice", [85, 90, 88])
              avg = db.get_average("Alice")
              expected = (85 + 90 + 88) / 3
              if abs(avg - expected) < 0.01:
                  result = {"passed": True, "message": "✓ get_average works correctly"}
              else:
                  result = {"passed": False, "message": f"✗ Expected: {expected:.2f}, Actual: {avg:.2f}"}
      except Exception as e:
          result = {"passed": False, "message": f"✗ Error: {str(e)}"}
      result

