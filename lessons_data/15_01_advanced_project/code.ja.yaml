              cursor = db.conn.cursor()
              cursor.execute("SELECT * FROM students")
              result = {"passed": True, "message": "✓ students テーブルが正しく作成されています"}
      except Exception as e:
          result = {"passed": False, "message": f"✗ エラー: {str(e)}"}
      result

  - name: "add_student と get_average の確認"
    description: "生徒を登録して平均点を正しく取得できるか"
    code: |
      try:
          import sqlite3
          exec_globals = {}
          exec(user_code, exec_globals)
          if 'StudentDB' not in exec_globals:
              result = {"passed": False, "message": "✗ StudentDB クラスが定義されていません"}
          else:
              db = exec_globals['StudentDB']()
              db.add_student("Alice", [85, 90, 88])
              avg = db.get_average("Alice")
              expected = (85 + 90 + 88) / 3
              if abs(avg - expected) < 0.01:
                  result = {"passed": True, "message": "✓ get_average が正しく動作しています"}
              else:
                  result = {"passed": False, "message": f"✗ 期待値: {expected:.2f}, 実際: {avg:.2f}"}
      except Exception as e:
          result = {"passed": False, "message": f"✗ エラー: {str(e)}"}
      result

