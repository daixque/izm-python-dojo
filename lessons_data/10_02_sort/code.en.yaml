solution_code: |
  def bubble_sort(numbers):
      result = numbers.copy()
      n = len(result)
      for i in range(n):
          for j in range(n - 1 - i):
              if result[j] > result[j + 1]:
                  result[j], result[j + 1] = result[j + 1], result[j]
      return result

  print(bubble_sort([5, 3, 8, 1, 2]))
  print(bubble_sort([-3, 0, -1, 2]))
  print(bubble_sort([1]))

