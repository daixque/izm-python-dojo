lesson:
  number: "01_03"  # Chapter_Lesson format
  id: "01_03_types"
  title: "Data Types and Conversion"

content: |
  <section class="section">
    <h2>What are Data Types?</h2>
    <p>In programming, data has different 'types'.</p>
    <p>The data type determines what you can do with that data.</p>
    <p>Understanding Python's data types will help you write more accurate programs.</p>
  </section>

  <section class="section">
    <h2>Main Data Types</h2>
    <p>Python has the following basic data types:</p>
    <ul>
      <li><strong>Integer (int)</strong>: Numbers without decimal points (e.g., 10, -5, 0)</li>
      <li><strong>Float (float)</strong>: Numbers with decimal points (e.g., 3.14, -0.5, 2.0)</li>
      <li><strong>String (str)</strong>: Text or characters (e.g., "Hello", "Python")</li>
      <li><strong>Boolean (bool)</strong>: Either True or False</li>
    </ul>
  </section>

  <section class="section">
    <h2>Checking Data Types with type()</h2>
    <p>You can use the <code>type()</code> function to check the type of data.</p>
    <p>This is useful when you're wondering "What type is this variable?"</p>
  </section>

  <section class="section">
    <h2>Difference Between Strings and Numbers</h2>
    <p>Even though they look the same, the string <code>"123"</code> and the integer <code>123</code> are different.</p>
    <p>String numbers cannot be used in calculations. You need to convert them to numeric types first.</p>
    <p>Conversely, when you want to treat a number as a string, you convert it to string type.</p>
  </section>

  <section class="section">
    <h2>Type Conversion (Casting)</h2>
    <p>Converting data types is called 'type conversion' or 'casting'.</p>
    <ul>
      <li><code>int()</code>: Convert to integer (e.g., <code>int("123")</code> → 123)</li>
      <li><code>float()</code>: Convert to float (e.g., <code>float("3.14")</code> → 3.14)</li>
      <li><code>str()</code>: Convert to string (e.g., <code>str(42)</code> → "42")</li>
    </ul>
    <p>Invalid conversions will cause errors (e.g., <code>int("hello")</code>).</p>
  </section>

  <section class="section">
    <h2>String Concatenation</h2>
    <p>You can concatenate (join) strings using the <code>+</code> operator.</p>
    <p>However, you cannot directly concatenate strings and numbers. Convert numbers to strings using <code>str()</code> first.</p>
  </section>

  <section class="examples">
    <h2>Examples</h2>
    
    <div class="example-item">
      <div class="example-title">Check Types with type()</div>
      <div class="example-code">print(type(42))        # &lt;class 'int'&gt;<br>print(type(3.14))      # &lt;class 'float'&gt;<br>print(type("Hello"))   # &lt;class 'str'&gt;<br>print(type(True))      # &lt;class 'bool'&gt;</div>
      <div class="example-explanation">You can check the type of each data.</div>
    </div>

    <div class="example-item">
      <div class="example-title">Convert String to Number</div>
      <div class="example-code">text = "100"<br>number = int(text)<br>print(number + 50)  # 150</div>
      <div class="example-explanation">Convert the string "100" to integer 100 and calculate.</div>
    </div>

    <div class="example-item">
      <div class="example-title">Convert Number to String</div>
      <div class="example-code">age = 14<br>message = "I am " + str(age) + " years old"<br>print(message)</div>
      <div class="example-explanation">Convert a number to a string to create a message.</div>
    </div>

    <div class="example-item">
      <div class="example-title">Convert to Float</div>
      <div class="example-code">text = "3.14"<br>pi = float(text)<br>print(pi * 2)  # 6.28</div>
      <div class="example-explanation">Convert a string to a float and calculate.</div>
    </div>

    <div class="example-item">
      <div class="example-title">Difference Between Integer and Float</div>
      <div class="example-code">a = 10<br>b = 10.0<br>print(type(a))  # &lt;class 'int'&gt;<br>print(type(b))  # &lt;class 'float'&gt;</div>
      <div class="example-explanation">10 and 10.0 look similar but have different types.</div>
    </div>

    <div class="example-item">
      <div class="example-title">String Concatenation</div>
      <div class="example-code">first = "Python"<br>second = " Programming"<br>print(first + second)  # Python Programming</div>
      <div class="example-explanation">Strings can be concatenated with +.</div>
    </div>

    <div class="example-item">
      <div class="example-title">Display Calculation Results as String</div>
      <div class="example-code">x = 5<br>y = 3<br>result = x + y<br>print("The answer is " + str(result))</div>
      <div class="example-explanation">Convert calculation results to string and include in message.</div>
    </div>
  </section>

