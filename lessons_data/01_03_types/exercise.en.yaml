lesson:
  number: "01_03"  # Chapter_Lesson format
  id: "01_03_types"
  title: "Data Types and Conversion"

task_description: |
  <p>Write a program that converts two numbers given as strings to integers, calculates their sum, and displays it.</p>
  <p>Finally, display the result in the format "The sum is ○○".</p>

instructions:
  - "Assign the string <code>\"50\"</code> to variable <code>num1</code>"
  - "Assign the string <code>\"30\"</code> to variable <code>num2</code>"
  - "Use <code>int()</code> to convert both to integers and calculate the sum"
  - "Display the result in the format 'The sum is ○○'"

hints:
  - "You can convert a string to integer with <code>int(num1)</code>"
  - "Calculate the sum with <code>int(num1) + int(num2)</code>"
  - "Use <code>str()</code> to convert numbers to strings"
  - "Example: <code>print(\"The sum is \" + str(sum))</code>"

