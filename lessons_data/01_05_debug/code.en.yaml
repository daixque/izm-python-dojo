  - name: "Test 2: Program runs without errors"
    description: "Check if all bugs are fixed and code runs without errors"
    code: |
      import sys
      from io import StringIO
      
      try:
          # Capture output
          old_stdout = sys.stdout
          sys.stdout = StringIO()
          
          # Execute user code
          exec_globals = {}
          exec(user_code, exec_globals)
          
          # Get output
          output = sys.stdout.getvalue()
          sys.stdout = old_stdout
          
          # If executed without errors, OK
          result = {"passed": True, "message": "✓ Program ran without errors"}
              
      except Exception as e:
          sys.stdout = old_stdout
          error_msg = str(e)
          
          # Provide hints based on error type
          if "NameError" in error_msg:
              hint = "Check the spelling of variable names (name vs namae)"
          elif "TypeError" in error_msg:
              hint = "Type conversion (int() or str()) may be needed"
          else:
              hint = "Read the error message carefully"
          
          result = {"passed": False, "message": f"✗ Error: {error_msg}\nHint: {hint}"}
      
      result

  - name: "Test 3: Correct output"
