    code: |
      import sys
      from io import StringIO
      
      try:
          # Capture output
          old_stdout = sys.stdout
          sys.stdout = StringIO()
          
          # Execute user code
          exec_globals = {}
          exec(user_code, exec_globals)
          
          # Get output
          output = sys.stdout.getvalue()
          sys.stdout = old_stdout
          
          # Check expected output content
          has_taro = "Taro" in output
          has_16 = "16" in output and "years old" in output  # 15 + 1 = 16
          has_170 = "170cm" in output  # 160 + 10 = 170
          
          if has_taro and has_16 and has_170:
              result = {"passed": True, "message": "✓ Correct content is displayed"}
          else:
              missing = []
              if not has_taro:
                  missing.append("'Taro'")
              if not has_16:
                  missing.append("'16 years old' (15+1)")
              if not has_170:
                  missing.append("'170cm' (160+10)")
              
              result = {"passed": False, "message": f"✗ Output is missing or incorrect: {', '.join(missing)}"}
              
      except Exception as e:
          sys.stdout = old_stdout
          result = {"passed": False, "message": f"✗ Error occurred: {str(e)}"}
      
      result
