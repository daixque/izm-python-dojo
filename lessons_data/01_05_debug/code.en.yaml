tests:
  - name: "Test 1: Basic syntax is correct"
    description: "Check if print statement is used correctly"
    code: |
      import sys
      from io import StringIO
      
      try:
          # Check if print() is used
          if 'print(' not in user_code:
              result = {"passed": False, "message": "✗ Please use the print() function"}
