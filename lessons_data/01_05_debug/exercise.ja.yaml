lesson:
  number: "01_05"
  id: "01_05_debug"
  title: "デバッグの基礎"

task_description: |
  <p>以下のコードには3つのバグがあります。エラーメッセージを読んで、すべてのバグを修正してください。</p>
  <p>修正後、正しく動作することを確認しましょう。</p>
  <p><strong>期待される動作：</strong></p>
  <ul>
    <li>「太郎くんは来年16歳です」と表示される</li>
    <li>「身長は160cmで、10cm伸びたら170cmです」と表示される</li>
  </ul>

instructions:
  - "エラーメッセージをよく読んで、問題のある行を特定します"
  - "1つずつバグを修正していきます"
  - "実行ボタンで動作確認をします"
  - "すべてのバグを修正できたら、テストで確認します"

hints:
  - "1つ目のバグ: 文字列と数値の足し算はできません。どちらかを型変換する必要があります"
  - "2つ目のバグ: 変数名のスペルが違います（name と namae）"
  - "3つ目のバグ: 計算が間違っています。10cm伸びたら…？"
  - "焦らず、1つずつ修正していきましょう"
