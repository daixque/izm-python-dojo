tests:
  - name:
      ja: "テスト1: 基本的な構文が正しい"
      en: "Test 1: Basic syntax is correct"
    description:
      ja: "print文が正しく使われているか"
      en: "Check if print statement is used correctly"
    code: |
      import sys
      from io import StringIO
      
      try:
          # print()の使用をチェック
          if 'print(' not in user_code:
              if lang == "ja":
                  result = {"passed": False, "message": "✗ print()関数を使ってください"}
              else:
                  result = {"passed": False, "message": "✗ Please use the print() function"}
          else:
              if lang == "ja":
                  result = {"passed": True, "message": "✓ print()関数が使われています"}
              else:
                  result = {"passed": True, "message": "✓ print() function is used"}
      except Exception as e:
          if lang == "ja":
              result = {"passed": False, "message": f"✗ エラーが発生しました: {str(e)}"}
          else:
              result = {"passed": False, "message": f"✗ Error occurred: {str(e)}"}
      
      result

  - name:
      ja: "テスト2: プログラムがエラーなく実行される"
      en: "Test 2: Program runs without errors"
    description:
      ja: "すべてのバグが修正され、エラーなく実行できるか"
      en: "Check if all bugs are fixed and code runs without errors"
    code: |
      import sys
      from io import StringIO
      
      try:
          # 出力をキャプチャ
          old_stdout = sys.stdout
          sys.stdout = StringIO()
          
          # ユーザーコードを実行
          exec_globals = {}
          exec(user_code, exec_globals)
          
          # 出力を取得
          output = sys.stdout.getvalue()
          sys.stdout = old_stdout
          
          # エラーなく実行できたらOK
          if lang == "ja":
              result = {"passed": True, "message": "✓ プログラムがエラーなく実行されました"}
          else:
              result = {"passed": True, "message": "✓ Program ran without errors"}
              
      except Exception as e:
          sys.stdout = old_stdout
          error_msg = str(e)
          
          # エラーの種類に応じてヒントを出す
          if "NameError" in error_msg:
              if lang == "ja":
                  hint = "変数名のスペルを確認してください（name と namae を間違えていませんか？）"
              else:
                  hint = "Check the spelling of variable names"
          elif "TypeError" in error_msg:
              if lang == "ja":
                  hint = "型変換（int()やstr()）が必要かもしれません"
              else:
                  hint = "Type conversion (int() or str()) may be needed"
          else:
              if lang == "ja":
                  hint = "エラーメッセージをよく読んでみましょう"
              else:
                  hint = "Read the error message carefully"
          
          if lang == "ja":
              result = {"passed": False, "message": f"✗ エラー: {error_msg}\nヒント: {hint}"}
          else:
              result = {"passed": False, "message": f"✗ Error: {error_msg}\nHint: {hint}"}
      
      result

  - name:
      ja: "テスト3: 正しい出力をしている"
      en: "Test 3: Correct output"
    description:
      ja: "期待される内容が正しく表示されているか"
      en: "Check if expected content is displayed correctly"
    code: |
      import sys
      from io import StringIO
      
      try:
          # 出力をキャプチャ
          old_stdout = sys.stdout
          sys.stdout = StringIO()
          
          # ユーザーコードを実行
          exec_globals = {}
          exec(user_code, exec_globals)
          
          # 出力を取得
          output = sys.stdout.getvalue()
          sys.stdout = old_stdout
          
          # 期待される出力内容をチェック
          has_taro = "太郎" in output
          has_16 = "16歳" in output  # 15 + 1 = 16
          has_170 = "170cm" in output  # 160 + 10 = 170
          
          if has_taro and has_16 and has_170:
              if lang == "ja":
                  result = {"passed": True, "message": "✓ 正しい内容が表示されています"}
              else:
                  result = {"passed": True, "message": "✓ Correct content is displayed"}
          else:
              missing = []
              if not has_taro:
                  missing.append("「太郎」" if lang == "ja" else "'Taro'")
              if not has_16:
                  missing.append("「16歳」(15+1)" if lang == "ja" else "'16 years old' (15+1)")
              if not has_170:
                  missing.append("「170cm」(160+10)" if lang == "ja" else "'170cm' (160+10)")
              
              if lang == "ja":
                  result = {"passed": False, "message": f"✗ 出力に不足または誤りがあります: {', '.join(missing)}"}
              else:
                  result = {"passed": False, "message": f"✗ Output is missing or incorrect: {', '.join(missing)}"}
              
      except Exception as e:
          sys.stdout = old_stdout
          if lang == "ja":
              result = {"passed": False, "message": f"✗ エラーが発生しました: {str(e)}"}
          else:
              result = {"passed": False, "message": f"✗ Error occurred: {str(e)}"}
      
      result

