solution_code: |
  def calculate_average(scores):
      averages = {}
      for name, score_list in scores.items():
          averages[name] = sum(score_list) / len(score_list)
      return averages

  def find_top_student(averages):
      top_student = None
      max_avg = -1
      for name, avg in averages.items():
          if avg > max_avg:
              max_avg = avg
              top_student = name
      return top_student

  def count_passing(averages, passing_score=60):
      count = 0
      for avg in averages.values():
          if avg >= passing_score:
              count += 1
      return count

  # Test runs
  scores = {
      "Alice": [85, 90, 88],
      "Bob": [70, 75, 72],
      "Charlie": [55, 60, 58]
  }
  averages = calculate_average(scores)
  print("Averages:", averages)
  print("Top student:", find_top_student(averages))
  print("Passing count:", count_passing(averages))

