initial_code: |
  # input() を使って名前を入力してもらい、挨拶を表示しよう
  

initial_files: []

tests:
  - name: "テスト1: input()で名前を入力している"
    description: "input()関数を使って名前を入力しているか"
    inputs:
      - "太郎"
    code: |
      import sys
      from io import StringIO
      
      try:
          # input()の使用をチェック
          if 'input(' not in user_code:
              result = {"passed": False, "message": "✗ input()関数を使ってください"}
          else:
              result = {"passed": True, "message": "✓ input()関数が使われています"}
      except Exception as e:
          result = {"passed": False, "message": f"✗ エラーが発生しました: {str(e)}"}
      
      result

  - name: "テスト2: 挨拶を正しく表示している"
    description: "入力された名前を使って挨拶を表示しているか"
    inputs:
      - "太郎"
    code: |
      import sys
      from io import StringIO
      
      try:
          # 出力をキャプチャ
          old_stdout = sys.stdout
          sys.stdout = StringIO()
          
          # ユーザーコードを実行
          exec_globals = {}
          exec(user_code, exec_globals)
          
          # 出力を取得
          output = sys.stdout.getvalue()
          sys.stdout = old_stdout
          
          # 名前が出力に含まれているかチェック
          if "太郎" in output:
              result = {"passed": True, "message": "✓ 入力された名前が正しく表示されています"}
          else:
              result = {"passed": False, "message": "✗ 入力された名前を表示してください"}
      except Exception as e:
          sys.stdout = old_stdout
          result = {"passed": False, "message": f"✗ エラーが発生しました: {str(e)}"}
      
      result

  - name: "テスト3: 挨拶のフォーマットが正しい"
    description: "「こんにちは」などの挨拶言葉が含まれているか"
    inputs:
      - "花子"
    code: |
      import sys
      from io import StringIO
      
      try:
          # 出力をキャプチャ
          old_stdout = sys.stdout
          sys.stdout = StringIO()
          
          # ユーザーコードを実行
          exec_globals = {}
          exec(user_code, exec_globals)
          
          # 出力を取得
          output = sys.stdout.getvalue()
          sys.stdout = old_stdout
          
          # 挨拶言葉と名前をチェック
          greeting_words = ["こんにちは", "おはよう", "こんばんは"]
          has_greeting = any(word in output for word in greeting_words)
          has_name = "花子" in output
          
          if has_greeting and has_name:
              result = {"passed": True, "message": "✓ 挨拶のフォーマットが正しいです"}
          elif not has_greeting:
              result = {"passed": False, "message": "✗ 挨拶言葉（こんにちは など）を含めてください"}
          else:
              result = {"passed": False, "message": "✗ 入力された名前を含めてください"}
      except Exception as e:
          sys.stdout = old_stdout
          result = {"passed": False, "message": f"✗ エラーが発生しました: {str(e)}"}
      
      result
