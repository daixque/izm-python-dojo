lesson:
  number: "01_04"
  id: "01_04_input"
  title: "ユーザー入力"

task_description: |
  <p><code>input()</code>関数を使って、ユーザーに名前を入力してもらい、挨拶を返すプログラムを書きましょう。</p>
  <p>「こんにちは、○○さん！」という形式で挨拶を表示してください。</p>

instructions:
  - "<code>input()</code> を使って、名前を入力してもらいます"
  - "入力された名前を変数 <code>name</code> に保存します"
  - "「こんにちは、○○さん！」という形式で挨拶を表示します"

hints:
  - "<code>input(\"名前を入力してください: \")</code> でメッセージと共に入力を受け取れます"
  - "文字列の連結には <code>+</code> を使います"
  - "例: <code>print(\"こんにちは、\" + name + \"さん！\")</code>"
