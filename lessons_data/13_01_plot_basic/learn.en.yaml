lesson:
  number: "13_01"
  id: "13_01_plot_basic"
  title: "Basic Charts"

content: |
  <section class="section">
    <h2>📊 What is Matplotlib?</h2>
    <p>Matplotlib is a Python library for drawing graphs and charts. It lets you easily create bar charts, line charts, scatter plots, and many other types of visualizations.</p>
    <p>Rather than looking at raw numbers, turning data into a chart makes it easy to spot trends and patterns at a glance. This is called <strong>data visualization</strong>.</p>
  </section>

  <section class="section">
    <h2>🔧 Basic Matplotlib Usage</h2>
    <p>To use Matplotlib, import <code>matplotlib.pyplot</code> with the alias <code>plt</code>.</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">How to import</div>
      <div class="example-code">import matplotlib.pyplot as plt</div>
      <div class="example-explanation">Using <code>as plt</code> means you can write <code>plt.bar()</code> instead of the full name.</div>
    </div>

    <div class="example-item">
      <div class="example-title">Drawing a bar chart</div>
      <div class="example-code">x = [1, 2, 3]<br>y = [10, 25, 15]<br><br>plt.bar(x, y)<br>plt.show()</div>
      <div class="example-explanation"><code>plt.bar(x, y)</code> creates a bar chart. <code>x</code> sets the position of each bar and <code>y</code> sets its height. Call <code>plt.show()</code> to display it.</div>
    </div>

    <div class="example-item">
      <div class="example-title">Adding a title and axis labels</div>
      <div class="example-code">plt.bar(x, y)<br>plt.title("Sales Chart")    # chart title<br>plt.xlabel("Month")        # x-axis label<br>plt.ylabel("Sales (10k)")  # y-axis label<br>plt.show()</div>
      <div class="example-explanation">Adding labels makes it immediately clear what the chart represents.</div>
    </div>

    <div class="example-item">
      <div class="example-title">Drawing a line chart</div>
      <div class="example-code">x = [1, 2, 3, 4, 5]<br>y = [10, 15, 12, 20, 18]<br><br>plt.plot(x, y)<br>plt.title("Temperature Changes")<br>plt.xlabel("Day")<br>plt.ylabel("Temperature (°C)")<br>plt.show()</div>
      <div class="example-explanation">Use <code>plt.plot()</code> instead of <code>plt.bar()</code> to get a line chart. It's great for showing changes over time.</div>
    </div>
  </section>

  <section class="section">
    <h2>📝 Steps to draw a chart</h2>
    <ol>
      <li>Import with <code>import matplotlib.pyplot as plt</code></li>
      <li>Prepare your data in variables</li>
      <li>Choose a chart type with <code>plt.bar()</code> or <code>plt.plot()</code></li>
      <li>Set labels with <code>plt.title()</code>, <code>plt.xlabel()</code>, <code>plt.ylabel()</code></li>
      <li>Display the chart with <code>plt.show()</code></li>
    </ol>
  </section>
