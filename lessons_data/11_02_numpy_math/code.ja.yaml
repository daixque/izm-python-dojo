solution_code: |
  import numpy as np

  def normalize(data):
      arr = np.array(data, dtype=float)
      return (arr - arr.min()) / (arr.max() - arr.min())

  print(normalize([0, 5, 10]))
  print(normalize([2, 4, 6, 8]))

