solution_code: |
  def linear_search(items, target):
      for i in range(len(items)):
          if items[i] == target:
              return i
      return -1

  print(linear_search([3, 1, 4, 1, 5], 4))
  print(linear_search([3, 1, 4, 1, 5], 9))

