solution_code: |
  class Counter:
      def __init__(self):
          self.count = 0

      def increment(self):
          self.count += 1

      def reset(self):
          self.count = 0

      def get_count(self):
          return self.count

  c = Counter()
  c.increment()
  c.increment()
  print(c.get_count())
  c.reset()
  print(c.get_count())

