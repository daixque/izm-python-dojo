  - name: "increment() と get_count() の確認"
    description: "increment() を2回呼んだあと get_count() が 2 を返すか"
    code: |
      try:
          exec_globals = {}
          exec(user_code, exec_globals)

          if 'Counter' not in exec_globals:
              result = {"passed": False, "message": "✗ クラス Counter が定義されていません"}
          else:
              c = exec_globals['Counter']()
              c.increment()
              c.increment()
              count = c.get_count()
              if count == 2:
                  result = {"passed": True, "message": "✓ increment() × 2 → get_count() = 2 正解です"}
              else:
                  result = {"passed": False, "message": f"✗ get_count() は 2 になるはずです。実際: {count}"}
      except Exception as e:
          result = {"passed": False, "message": f"✗ エラー: {str(e)}"}
      result

