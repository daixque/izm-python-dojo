lesson:
  number: "08_02"
  id: "08_02_class_methods"
  title: "Methods and Instances"

content: |
  <section class="section">
    <h2>🔧 What Are Instance Methods?</h2>
    <p>A function defined inside a class is called a <strong>method</strong>.</p>
    <p>In particular, methods that operate on an object (instance) are called <strong>instance methods</strong>.</p>
    <p>Instance methods always take <code>self</code> as their first parameter.</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">Instance method basics</div>
      <div class="example-code">class Counter:<br>&nbsp;&nbsp;&nbsp;&nbsp;def __init__(self):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.count = 0<br><br>&nbsp;&nbsp;&nbsp;&nbsp;def increment(self):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.count += 1<br><br>&nbsp;&nbsp;&nbsp;&nbsp;def get_count(self):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return self.count<br><br>c = Counter()<br>c.increment()<br>c.increment()<br>print(c.get_count())&nbsp;&nbsp;# 2</div>
      <div class="example-explanation">
        Each time <code>increment()</code> is called, <code>self.count</code> increases by 1.<br>
        <code>get_count()</code> retrieves the current count.
      </div>
    </div>
  </section>

  <section class="section">
    <h2>🎯 The Role of self</h2>
    <p>Inside a method, <code>self</code> refers to "this object itself".</p>
    <p>Use <code>self.attribute</code> to access attributes of that object.</p>
    <p>Use <code>self.method()</code> to call other methods of that object.</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">Manipulating attributes with self</div>
      <div class="example-code">class BankAccount:<br>&nbsp;&nbsp;&nbsp;&nbsp;def __init__(self, balance):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.balance = balance<br><br>&nbsp;&nbsp;&nbsp;&nbsp;def deposit(self, amount):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.balance += amount<br><br>&nbsp;&nbsp;&nbsp;&nbsp;def withdraw(self, amount):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.balance -= amount<br><br>account = BankAccount(1000)<br>account.deposit(500)<br>account.withdraw(200)<br>print(account.balance)&nbsp;&nbsp;# 1300</div>
      <div class="example-explanation">
        <code>self.balance</code> refers to this object's balance.<br>
        The <code>deposit</code> and <code>withdraw</code> methods can change the balance.
      </div>
    </div>

    <div class="example-item">
      <div class="example-title">Calling methods with self</div>
      <div class="example-code">class Circle:<br>&nbsp;&nbsp;&nbsp;&nbsp;def __init__(self, radius):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.radius = radius<br><br>&nbsp;&nbsp;&nbsp;&nbsp;def diameter(self):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return self.radius * 2<br><br>&nbsp;&nbsp;&nbsp;&nbsp;def circumference(self):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;# Call another method using self<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return self.diameter() * 3.14<br><br>c = Circle(5)<br>print(c.diameter())&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;# 10<br>print(c.circumference())&nbsp;&nbsp;# 31.4</div>
      <div class="example-explanation">
        To call another method from within a method, use <code>self.method_name()</code>.
      </div>
    </div>
  </section>

  <section class="section">
    <h2>🔄 Updating Attributes</h2>
    <p>Calling a method can change an object's attributes.</p>
    <p>The change is retained for that same object.</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">An object with state</div>
      <div class="example-code">class Timer:<br>&nbsp;&nbsp;&nbsp;&nbsp;def __init__(self):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.seconds = 0<br><br>&nbsp;&nbsp;&nbsp;&nbsp;def tick(self):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.seconds += 1<br><br>&nbsp;&nbsp;&nbsp;&nbsp;def reset(self):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.seconds = 0<br><br>t = Timer()<br>t.tick()<br>t.tick()<br>t.tick()<br>print(t.seconds)&nbsp;&nbsp;# 3<br>t.reset()<br>print(t.seconds)&nbsp;&nbsp;# 0</div>
      <div class="example-explanation">
        <code>seconds</code> increases each time <code>tick()</code> is called.<br>
        <code>reset()</code> sets it back to 0. An object holds its state.
      </div>
    </div>
  </section>

  <section class="section">
    <h2>🏠 Independence of Multiple Instances</h2>
    <p>Even objects created from the same class each hold their own independent state.</p>
    <p>Changing one object does not affect another.</p>
  </section>

  <section class="examples">
    <div class="example-item">
      <div class="example-title">Instances are independent</div>
      <div class="example-code">class Counter:<br>&nbsp;&nbsp;&nbsp;&nbsp;def __init__(self):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.count = 0<br><br>&nbsp;&nbsp;&nbsp;&nbsp;def increment(self):<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.count += 1<br><br>c1 = Counter()<br>c2 = Counter()<br><br>c1.increment()<br>c1.increment()<br>c1.increment()<br><br>c2.increment()<br><br>print(c1.count)&nbsp;&nbsp;# 3<br>print(c2.count)&nbsp;&nbsp;# 1 (independent from c1)</div>
      <div class="example-explanation">
        <code>c1</code> and <code>c2</code> are separate objects.<br>
        Changing <code>c1</code> does not affect <code>c2</code>.
      </div>
    </div>
  </section>

  <section class="section">
    <h2>💡 Summary</h2>
    <ul>
      <li>Instance methods always take <code>self</code> as their first parameter</li>
      <li>Inside a method, <code>self</code> refers to "this object itself"</li>
      <li>Access and modify attributes using <code>self.attribute</code></li>
      <li>Call other methods on the same object using <code>self.method()</code></li>
      <li>Each instance of the same class holds its own independent state</li>
    </ul>
  </section>
