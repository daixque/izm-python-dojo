          cursor = conn.cursor()
          cursor.execute("CREATE TABLE users (id INTEGER, name TEXT, age INTEGER)")
          cursor.executemany("INSERT INTO users VALUES (?, ?, ?)", [
              (3, "Charlie", 22), (1, "Alice", 25), (2, "Bob", 30)
